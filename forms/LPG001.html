<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetsisPad</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body, html { height: 100%; margin: 0; display: flex; flex-direction: column; overflow: hidden; background-color: #282a36; }

        .editor-menubar { background-color: #1e1f29; border-bottom: 1px solid #44475a; padding: 0.2rem 0.5rem; }
        .navbar-brand { font-weight: 800; color: #bd93f9 !important; font-size: 1.1rem; margin-left: 0.5rem; }
        .nav-link { font-size: 0.85rem; color: #f8f8f2 !important; padding: 0.4rem 0.8rem !important; }
        .nav-link:hover { background-color: #44475a; border-radius: 4px; }
        .dropdown-menu { background-color: #282a36; border: 1px solid #44475a; }
        .dropdown-item { color: #f8f8f2; }
        .dropdown-item:hover { background-color: #44475a; color: #fff; }
        
        #editor-container { flex-grow: 1; position: relative; }
        #editor { position: absolute; top: 0; right: 0; bottom: 0; left: 0; font-size: 15px; }

        #toast { position: fixed; bottom: 20px; right: 20px; background: #44475a; color: #f8f8f2; padding: 10px 20px; border-radius: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1050; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand editor-menubar">
        <a class="navbar-brand" href="#"><i class="bi bi-code-square"></i> MetsisPad</a>
        
        <ul class="navbar-nav me-auto">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">File</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" onclick="document.getElementById('fileInput').click()">Open</a></li>
                    <li><a class="dropdown-item" onclick="saveFile()">Save As</a></li>
                </ul>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Edit</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" onclick="editor.selectAll()">Select All</a></li>
                    <li><a class="dropdown-item" onclick="copyText()">Copy</a></li>
                    <li><a class="dropdown-item" onclick="pasteText()">Paste</a></li>
                </ul>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" id="languageLabel">Lang: JavaScript</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" onclick="setLanguage('javascript')">JavaScript</a></li>
                    <li><a class="dropdown-item" onclick="setLanguage('html')">HTML</a></li>
                    <li><a class="dropdown-item" onclick="setLanguage('css')">CSS</a></li>
                    <li><a class="dropdown-item" onclick="setLanguage('python')">Python</a></li>
                    <li><a class="dropdown-item" onclick="setLanguage('java')">Java</a></li>
                </ul>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle text-success" href="#" data-bs-toggle="dropdown">Run</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item text-success" onclick="runCode()">Execute in Browser</a></li>
                </ul>
            </li>
        </ul>
        <input type="file" id="fileInput" class="d-none" onchange="openFile(event)">
    </nav>

    <div id="editor-container"><div id="editor">console.log("Welcome to MetsisPad");</div></div>
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    
    <script>
        const editor = ace.edit("editor");
        let currentLang = 'javascript';
        const langNames = { 'javascript': 'JavaScript', 'html': 'HTML', 'css': 'CSS', 'python': 'Python', 'java': 'Java' };

        editor.setOptions({ theme: "ace/theme/dracula", fontSize: '15px', showPrintMargin: false });

        // Detection Logic
        function analyze(code) {
            if (/<!DOCTYPE html>/i.test(code)) return 'html';
            if (/\b(public|class|void|static)\b/i.test(code)) return 'java';
            if (/\b(def|elif|print|import)\b/i.test(code)) return 'python';
            if (/[a-z-]+\s*:\s*[^;{}]+;/i.test(code)) return 'css';
            return 'javascript';
        }

        // Auto-detection event listener
        editor.on('change', () => {
            clearTimeout(window.det);
            window.det = setTimeout(() => {
                const detected = analyze(editor.getValue());
                if (detected !== currentLang) setLanguage(detected);
            }, 800);
        });

        function setLanguage(lang) {
            currentLang = lang;
            editor.session.setMode("ace/mode/" + lang);
            document.getElementById('languageLabel').innerText = "Lang: " + langNames[lang];
        }

        function runCode() {
            if (currentLang === "javascript") {
                try { eval(editor.getValue()); } catch(e) { alert("Error: " + e.message); }
            } else if (currentLang === "html") {
                const w = window.open(); w.document.write(editor.getValue()); w.document.close();
            } else {
                showToast("Run only available for JS and HTML.");
            }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2000);
        }

        // Helpers
        function saveFile() {
            const blob = new Blob([editor.getValue()], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `MetsisCode.${currentLang === 'javascript' ? 'js' : currentLang}`;
            a.click();
        }
        function openFile(e) {
            const r = new FileReader();
            r.onload = (ev) => editor.setValue(ev.target.result, -1);
            r.readAsText(e.target.files[0]);
        }
        function copyText() { navigator.clipboard.writeText(editor.getValue()); showToast("Copied!"); }
        async function pasteText() { editor.insert(await navigator.clipboard.readText()); }
    </script>
</body>
</html>
