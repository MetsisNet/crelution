<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEM</title>
    <!-- Favicon link -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <!-- Google Fonts - Public Sans (Pixinvent Materialize Style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Online Stylesheets (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --mat-primary: #7367f0;
            --mat-primary-hover: #655bd3;
            --mat-secondary: #808390;
            --mat-success: #28c76f;
            --mat-info: #00cfdd;
            --mat-warning: #ff9f43;
            --mat-danger: #ea5455;
            --mat-dark: #4b465c;
            --mat-body-bg: #f8f7fa;
            --mat-card-bg: #ffffff;
            --mat-border-color: #dbade5;
            --mat-border: #e6e6e8;
            --mat-shadow: 0 0.25rem 0.875rem 0 rgba(38, 43, 67, 0.08);
            --mat-shadow-hover: 0 0.5rem 1.25rem 0 rgba(38, 43, 67, 0.12);
            --mat-text: #4b465c;
            --mat-text-muted: #808390;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: var(--mat-body-bg);
            font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--mat-text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-size: 0.875rem;
        }

        /* Materialize Controls & Form Controls */
        .form-control, .form-select {
            color: var(--mat-text) !important;
            background-color: #ffffff !important;
            border: 1px solid var(--mat-border) !important;
            border-radius: 6px !important;
            padding: 7px 12px !important;
            font-size: 13px !important;
            box-shadow: none !important;
            transition: all 0.2s ease-in-out;
            width: 100%;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--mat-primary) !important;
            box-shadow: 0 0 0 0.2rem rgba(115, 103, 240, 0.2) !important;
            outline: none !important;
        }

        /* Pixinvent Floating / Sticky Header */
        .app-header {
            background-color: #ffffff !important;
            border-radius: 10px;
            padding: 12px 20px;
            box-shadow: var(--mat-shadow);
            position: sticky;
            top: 12px;
            z-index: 1020;
            margin: 12px auto 20px auto;
            max-width: calc(100% - 32px);
            border: 1px solid rgba(75, 70, 92, 0.05);
        }
        .app-header .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--mat-dark);
            margin: 0;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
        }
        .header-top-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .header-input-group {
            position: relative;
            width: auto;
        }

        /* Sidebar Styling */
        .app-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            z-index: 1060;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .app-sidebar.open {
            left: 0;
        }
        .sidebar-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(47, 43, 61, 0.4);
            backdrop-filter: blur(2px);
            z-index: 1055;
            display: none;
        }
        .sidebar-backdrop.show {
            display: block;
        }

        /* Inline DataGrid Details Expansion Panel */
        .inline-details-row {
            background-color: #f8f7fa !important;
        }
        .inline-details-container {
            background: #ffffff;
            border: 1px solid var(--mat-border);
            border-radius: 8px;
            padding: 16px;
            margin: 6px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        /* Materialize Styled Buttons */
        .btn-porto-primary {
            background-color: var(--mat-primary) !important;
            border: 1px solid var(--mat-primary) !important;
            color: #ffffff !important;
            border-radius: 6px !important;
            font-weight: 500 !important;
            font-size: 13px !important;
            padding: 7px 16px !important;
            box-shadow: 0 0.125rem 0.25rem 0 rgba(115, 103, 240, 0.4) !important;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .btn-porto-primary:hover {
            background-color: var(--mat-primary-hover) !important;
            border-color: var(--mat-primary-hover) !important;
            box-shadow: 0 0.25rem 0.5rem 0 rgba(115, 103, 240, 0.4) !important;
            color: #ffffff !important;
        }

        .btn-porto-success {
            background-color: var(--mat-success) !important;
            border: 1px solid var(--mat-success) !important;
            color: #ffffff !important;
            border-radius: 6px !important;
            font-weight: 500 !important;
            font-size: 13px !important;
            padding: 7px 16px !important;
            box-shadow: 0 0.125rem 0.25rem 0 rgba(40, 199, 111, 0.4) !important;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .btn-porto-success:hover {
            background-color: #24b363 !important;
            border-color: #24b363 !important;
            box-shadow: 0 0.25rem 0.5rem 0 rgba(40, 199, 111, 0.4) !important;
            color: #ffffff !important;
        }

        .btn-porto-info {
            background-color: var(--mat-info) !important;
            border: 1px solid var(--mat-info) !important;
            color: #ffffff !important;
            border-radius: 6px !important;
            font-weight: 500 !important;
            font-size: 13px !important;
            padding: 7px 16px !important;
            box-shadow: 0 0.125rem 0.25rem 0 rgba(0, 207, 221, 0.4) !important;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .btn-porto-info:hover {
            background-color: #00b8c4 !important;
            border-color: #00b8c4 !important;
            color: #ffffff !important;
            box-shadow: 0 0.25rem 0.5rem 0 rgba(0, 207, 221, 0.4) !important;
        }

        .btn-porto-secondary {
            background-color: rgba(168, 170, 174, 0.16) !important;
            border: 1px solid transparent !important;
            border-radius: 6px !important;
            color: var(--mat-dark) !important;
            font-weight: 500 !important;
            font-size: 13px !important;
            padding: 7px 16px !important;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .btn-porto-secondary:hover {
            background-color: rgba(168, 170, 174, 0.28) !important;
            color: var(--mat-dark) !important;
        }

        .btn-porto-danger {
            background-color: var(--mat-danger) !important;
            border: 1px solid var(--mat-danger) !important;
            color: #ffffff !important;
            border-radius: 6px !important;
            padding: 7px 16px !important;
            font-size: 13px !important;
            font-weight: 500 !important;
            box-shadow: 0 0.125rem 0.25rem 0 rgba(234, 84, 85, 0.4) !important;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .btn-porto-danger:hover {
            background-color: #d34b4c !important;
            border-color: #d34b4c !important;
            box-shadow: 0 0.25rem 0.5rem 0 rgba(234, 84, 85, 0.4) !important;
            color: #ffffff !important;
        }

        .grid-action-btn {
            background: rgba(115, 103, 240, 0.08);
            border: 1px solid rgba(115, 103, 240, 0.16);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--mat-primary);
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            white-space: nowrap;
        }
        .grid-action-btn:hover {
            background: var(--mat-primary);
            color: #ffffff;
            border-color: var(--mat-primary);
        }
        .btn-act-delete {
            color: var(--mat-danger);
            border-color: rgba(234, 84, 85, 0.2);
            background: rgba(234, 84, 85, 0.08);
        }
        .btn-act-delete:hover {
            background: var(--mat-danger);
            color: #ffffff;
            border-color: var(--mat-danger);
        }

        /* Materialize Card System */
        .card {
            border: none !important;
            border-radius: 10px !important;
            box-shadow: var(--mat-shadow) !important;
            background-color: #ffffff !important;
        }

        /* Modal Container & Backdrop */
        .porto-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(47, 43, 61, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
            z-index: 1050;
            overflow-y: auto;
        }

        .porto-modal {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.5rem 1.5rem 0 rgba(38, 43, 67, 0.25);
            padding: 24px 28px;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            margin: auto;
            position: relative;
            animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-x: hidden;
        }
        .porto-modal-lg {
            max-width: 860px;
        }

        @keyframes modalFadeIn {
            from { transform: translateY(-10px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Materialize Toast Notifications */
        #portoNotificationContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 11000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 360px;
            width: calc(100% - 48px);
        }
        .porto-toast {
            background: #2f2b3d;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0.25rem 1rem rgba(0, 0, 0, 0.2);
            transition: opacity 0.2s ease;
        }
        .porto-toast.toast-success { border-left: 4px solid var(--mat-success); }
        .porto-toast.toast-danger { border-left: 4px solid var(--mat-danger); }
        .porto-toast.toast-warning { border-left: 4px solid var(--mat-warning); }
        .porto-toast.toast-info { border-left: 4px solid var(--mat-info); }
        .porto-toast-close {
            cursor: pointer;
            margin-left: 12px;
            font-weight: bold;
            opacity: 0.7;
        }
        .porto-toast-close:hover { opacity: 1; }

        /* Autocomplete Box */
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid var(--mat-border);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1080;
            box-shadow: 0 0.25rem 1rem rgba(38, 43, 67, 0.12);
        }
        .autocomplete-suggestion {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f3;
            color: var(--mat-text);
        }
        .autocomplete-suggestion:last-child {
            border-bottom: none;
        }
        .autocomplete-suggestion:hover, .autocomplete-active {
            background-color: rgba(115, 103, 240, 0.08);
            color: var(--mat-primary);
        }

        /* Table Styling */
        .table-responsive-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            width: 100%;
        }
        .table-responsive-wrapper table {
            min-width: 600px;
        }
        .table {
            color: var(--mat-text) !important;
            margin-bottom: 0;
        }
        .table > thead {
            background-color: #f8f7fa !important;
            border-bottom: 1px solid var(--mat-border) !important;
        }
        .table > thead th {
            font-size: 0.75rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.8px !important;
            font-weight: 600 !important;
            color: var(--mat-text-muted) !important;
            padding: 12px 16px !important;
            border: none !important;
        }
        .table > tbody td {
            padding: 12px 16px !important;
            border-bottom: 1px solid var(--mat-border) !important;
            font-size: 13px !important;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(115, 103, 240, 0.04) !important;
        }

        /* Calendar Picker */
        .month-calendar-picker {
            max-width: calc(100vw - 24px);
            background: #ffffff;
            border: 1px solid var(--mat-border);
            border-radius: 8px;
            box-shadow: 0 0.25rem 1rem rgba(38, 43, 67, 0.15);
            padding: 12px;
        }
        .month-btn {
            padding: 6px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            background: #f8f7fa;
            border: 1px solid var(--mat-border);
            color: var(--mat-text);
            transition: all 0.15s ease-in-out;
        }
        .month-btn:hover {
            background: rgba(115, 103, 240, 0.12);
            color: var(--mat-primary);
            border-color: rgba(115, 103, 240, 0.2);
        }
        .month-btn.active {
            background: var(--mat-primary);
            color: #fff;
            border-color: var(--mat-primary);
            box-shadow: 0 0.125rem 0.25rem 0 rgba(115, 103, 240, 0.4);
        }

        /* Dashboard Metric Cards */
        .dash-card {
            background: #ffffff;
            border-radius: 10px;
            border: none;
            padding: 20px;
            box-shadow: var(--mat-shadow);
            transition: all 0.2s ease-in-out;
        }
        .dash-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--mat-shadow-hover);
        }

        /* Avatar Icon Badges */
        .avatar-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .avatar-primary { background: rgba(115, 103, 240, 0.12); color: var(--mat-primary); }
        .avatar-warning { background: rgba(255, 159, 67, 0.12); color: var(--mat-warning); }
        .avatar-success { background: rgba(40, 199, 111, 0.12); color: var(--mat-success); }
        .avatar-info { background: rgba(0, 207, 221, 0.12); color: var(--mat-info); }

        /* Responsive Optimization */
        @media (max-width: 992px) {
            .porto-modal {
                max-width: 92vw;
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .app-header {
                padding: 12px 16px;
                margin: 8px 10px 16px 10px;
                max-width: calc(100% - 20px);
            }
            .app-header .header-title {
                font-size: 1.1rem;
            }
            #portoNotificationContainer {
                left: 12px;
                right: 12px;
                bottom: 12px;
                max-width: calc(100% - 24px);
            }
            .porto-modal {
                padding: 18px 16px;
                max-height: 92vh;
                width: 100%;
            }
            .dash-card {
                padding: 16px;
            }
        }

        @media (max-width: 576px) {
            #btnCreateOrder .btn-text {
                display: none;
            }
            #btnCreateOrder {
                padding: 7px 10px !important;
                width: auto !important;
                flex: none !important;
            }
            .header-top-right {
                gap: 6px;
            }
            .header-input-group #gEntryMonth {
                width: 80px !important;
            }
            .card {
                padding: 14px !important;
            }
            .porto-modal-backdrop {
                padding: 8px;
            }
            .porto-modal {
                padding: 16px 14px;
            }
            .grid-action-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
            .month-calendar-picker {
                right: 0 !important;
                left: auto !important;
                width: 230px !important;
            }
        }
    </style>
</head>
<body>

<!-- MATERIALIZE FLOATING NAVBAR WITH SIDEBAR TOGGLE & TOP RIGHT ACTIONS -->
<header class="app-header mb-4">
    <div class="d-flex justify-content-between align-items-center flex-nowrap gap-2">
        <!-- HAMBURGER MENU BUTTON & TITLE -->
        <div class="d-flex align-items-center gap-2">
            <button type="button" id="btnToggleSidebar" class="btn btn-outline-secondary border-0 fs-5 p-1 text-dark" title="Open Sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h5 class="header-title m-0"><i class="fa-solid fa-cube text-primary me-2 fs-4"></i>FEM</h5>
        </div>
        
        <!-- TOP RIGHT CORNER: MONTH BUTTON & CREATE ORDER BUTTON -->
        <div class="header-top-right">
            <!-- ENTRY MONTH & YEAR -->
            <div class="header-input-group autocomplete-wrapper position-relative">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-white text-secondary border-end-0 d-none d-sm-flex" title="Month & Year"><i class="fa-solid fa-calendar text-primary"></i></span>
                    <input type="text" id="gEntryMonth" class="form-control global-config-input bg-white text-center fw-bold border-start-0 border-end-0" readonly style="cursor: pointer; width: 95px; max-width: 105px; font-size: 12px;" placeholder="Select...">
                    <button type="button" class="btn btn-outline-secondary border-start-0" id="btnTriggerCalendar" title="Calendar">
                        <i class="fa-solid fa-calendar-days"></i>
                    </button>
                </div>
                
                <!-- Calendar Popup -->
                <div id="monthCalendarPopup" class="month-calendar-picker" style="display: none; position: absolute; top: 100%; right: 0; z-index: 1050; margin-top: 6px; min-width: 230px;">
                    <div class="month-calendar-header d-flex justify-content-between align-items-center mb-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary month-calendar-nav" id="btnCalPrev" title="Previous Year"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="calendarYearDisplay" class="month-calendar-year fw-bold text-dark">2026</span>
                        <button type="button" class="btn btn-sm btn-outline-secondary month-calendar-nav" id="btnCalNext" title="Next Year"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="month-grid" id="monthGridContainer" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;"></div>
                </div>
            </div>

            <!-- CREATE ORDER BUTTON -->
            <button id="btnCreateOrder" class="btn-porto-primary btn-sm" title="Create Order">
                <i class="fa-solid fa-plus"></i><span class="btn-text ms-1">Create Order</span>
            </button>
        </div>
    </div>
</header>

<!-- EXPANDABLE SIDEBAR NAVIGATION DRAWER -->
<div id="appSidebarBackdrop" class="sidebar-backdrop"></div>
<aside id="appSidebar" class="app-sidebar">
    <div class="sidebar-header d-flex justify-content-between align-items-center p-3 border-bottom">
        <h6 class="m-0 fw-bold text-dark"><i class="fa-solid fa-bars me-2 text-primary"></i>Menu & Actions</h6>
        <button type="button" id="btnCloseSidebar" class="btn-close" aria-label="Close"></button>
    </div>
    <div class="sidebar-body p-3 d-flex flex-column gap-2">
        <!-- PDF REPORT BUTTON -->
        <button id="btnPdfReport" class="btn-porto-info w-100 justify-content-start" title="Generate PDF Report">
            <i class="fa-solid fa-file-pdf me-2"></i> PDF Report
        </button>

        <!-- EXPORT TO JSON BUTTON -->
        <button id="btnExportJson" class="btn-porto-success w-100 justify-content-start" title="Export to JSON">
            <i class="fa-solid fa-file-export me-2"></i> Export JSON
        </button>

        <!-- IMPORT FROM JSON BUTTON -->
        <button id="btnImportJson" class="btn-porto-secondary w-100 justify-content-start" title="Import from JSON">
            <i class="fa-solid fa-file-import me-2"></i> Import JSON
        </button>
        <input type="file" id="jsonFileInput" accept=".json" style="display: none;">

        <!-- DELETE ALL BUTTON -->
        <button id="btnClearGrid1" class="btn-porto-danger w-100 justify-content-start" title="Delete All">
            <i class="fa-solid fa-trash-can me-2"></i> Delete All
        </button>
    </div>
</aside>

<div id="portoNotificationContainer"></div>
<div id="portoRouterViewport"></div>
<div id="portoModalContainer"></div>

<!-- WORKSPACE LAYOUT TEMPLATE -->
<template id="tpl-workspacePage">
    <main class="amzn-content px-2 px-md-4 mb-4">
        
        <!-- ADMIN HOMEPAGE SUMMARY DASHBOARD -->
        <div class="row g-3 mb-4">
            <!-- CURRENT DATE SUMMARY -->
            <div class="col-12 col-md-4">
                <div class="dash-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar-icon avatar-primary">
                                <i class="fa-solid fa-calendar-day"></i>
                            </div>
                            <h6 class="fw-bold m-0 text-dark" style="font-size:14px;">Today Summary</h6>
                        </div>
                        <span class="badge bg-label-primary text-primary bg-primary bg-opacity-10 px-2.5 py-1" id="dashTodayDate" style="font-size:11px; font-weight:600;">Today</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted" style="font-size:13px;">Today Income:</span>
                        <span class="fw-bold text-success" id="dashTodayInc">0.00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted" style="font-size:13px;">Today Expense:</span>
                        <span class="fw-bold text-danger" id="dashTodayExp">0.00</span>

    /* POP-UP CALENDAR PICKER */
    function toggleMonthCalendarPopup() {

    }

    function renderMonthCalendarGrid() {
        const yearDisplay = document.getElementById('calendarYearDisplay');

        if (!yearDisplay || !gridContainer) return;

        yearDisplay.innerText = calendarActiveYear;
        
        const currentSelectedToken = formConfigStateCache.entryMonth || "JULY-2026";
        const [selMonth, selYear] = currentSelectedToken.split("-");

        const frag = document.createDocumentFragment();
        calendarMonthNames.forEach(month => {
            const btn = document.createElement('div');
            const isSelected = (month === selMonth && String(calendarActiveYear) === selYear);
            btn.className = `month-btn ${isSelected ? 'active' : ''}`;
            btn.innerText = month.substring(0, 3);
            btn.setAttribute('data-month', month);
            frag.appendChild(btn);
        });
        gridContainer.replaceChildren(frag);
    }

    function selectCalendarMonthYear(monthStr, yearNum) {
        const formattedValue = `${monthStr}-${yearNum}`;
        const inputEl = document.getElementById('gEntryMonth');
        if (inputEl) {
            inputEl.value = formattedValue;
        }

        formConfigStateCache.entryMonth = formattedValue;
        
        const popup = document.getElementById('monthCalendarPopup');
        if (popup) popup.style.display = 'none';

        applyTimeSelectionFilters();
        if (document.getElementById('grid1Body')) {
            renderGrid1();
        }
        saveApplicationStateToDatabase();
        showNotification(`Timeframe updated to: ${formattedValue}`, "info");
    }

    /* ALPHABET CONVERSION FOR CUSTOM SERIAL GENERATION */
    function convertNumberToAlphabetCode(numStr) {
        let res = '';
        for (let i = 0; i < numStr.length; i++) {
            const val = parseInt(numStr[i]);
            res += (isNaN(val) || val === 0) ? 'Z' : String.fromCharCode(64 + val);
        }
        return res;
    }

    /* GET NEXT UNIQUE ORDER SEQUENCE */
    function getNextOrderSequence() {
        let maxSeq = 0;
        grid1Storage.forEach(r => {
            const orderNo = r["Order No."];
            if (orderNo && orderNo.length >= 4) {
                const seqNum = parseInt(orderNo.slice(-4), 10);
                if (!isNaN(seqNum) && seqNum > maxSeq) {
                    maxSeq = seqNum;
                }
            }
        });
        return maxSeq + 1;
    }

    /* AUTOMATIC ORDER NUMBER GENERATOR */
    function generateOrderNumber(entryMonthStr, sequenceNum) {
        const parts = (entryMonthStr || "JULY-2026").split("-");
        const monthName = (parts[0] || "JULY").toUpperCase();
        const yearStr = parts[1] || "2026";

        const monthIdx = calendarMonthNames.indexOf(monthName) + 1;
        const mmStr = String(monthIdx > 0 ? monthIdx : 1).padStart(2, '0');
        const yyStr = String(yearStr).slice(-2);

        const alphaYY = convertNumberToAlphabetCode(yyStr);
        const alphaMM = convertNumberToAlphabetCode(mmStr);
        const seqStr = String(sequenceNum).padStart(4, '0');

        return `${alphaYY}${alphaMM}${seqStr}`;
    }

    /* HELPER TO CONVERT TEXT TO PROPER CASE */
    function toProperCase(str) {
        if (!str) return '';
        return str.replace(/\b\w/g, char => char.toUpperCase());
    }

    function getMonthSortKey(monthYearStr) {
        if (!monthYearStr) return 0;
        const parts = monthYearStr.split('-');
        if (parts.length !== 2) return 0;
        const mIdx = calendarMonthNames.indexOf(parts[0].toUpperCase()) + 1;
        const yNum = parseInt(parts[1]) || 0;
        return yNum * 12 + mIdx;
    }

    function showNotification(message, type = "info") {
        const container = document.getElementById('portoNotificationContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = `porto-toast toast-${type}`;
        toast.innerHTML = `<span>${message}</span><span class="porto-toast-close">&times;</span>`;
        
        toast.querySelector('.porto-toast-close').addEventListener('click', () => toast.remove());
        
        container.appendChild(toast);
        setTimeout(() => {
            if (toast.parentElement) {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }
        }, 4000);
    }

    function showConfirmModal(message, confirmCallback) {
        const container = document.getElementById('portoModalContainer');
        container.innerHTML = `
            <div class="porto-modal-backdrop" style="z-index: 99990;">
                <div class="porto-modal" style="z-index: 99991; max-width: 440px;">
                    <h6 class="mb-2 text-dark font-weight-bold" style="font-size:15px; color: var(--mat-dark) !important;">Operational Confirmation</h6>
                    <p class="text-secondary mb-4" style="font-size:13px; line-height:1.4;">${message}</p>
                    <div class="text-end d-flex justify-content-end gap-2">
                        <button class="btn-porto-secondary" id="btnModalCancel" title="Cancel"><i class="fa-solid fa-xmark me-1"></i> Cancel</button>
                        <button class="btn-porto-danger" id="btnModalConfirm" title="Confirm Delete"><i class="fa-solid fa-trash me-1"></i> Confirm Delete</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('btnModalCancel').onclick = () => container.innerHTML = '';
        document.getElementById('btnModalConfirm').onclick = () => {
            container.innerHTML = '';
            confirmCallback();
        };
    }

    /* INDEXED STORAGE ENGINE */
    function initIndexedDBEngine() {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) { 
                db.createObjectStore(storeName, { keyPath: "id" }); 
            }
        };
        request.onsuccess = (e) => {
            dbInstance = e.target.result;
            loadApplicationStateFromDatabase();
        };
    }

    function saveApplicationStateToDatabase() {
        if (!dbInstance) return;

        const stateObj = {
            id: "session_state",
            formConfigStateCache: formConfigStateCache,
            grid1Data: grid1Storage,
            orderBulkMap: orderBulkMap
        };
        dbInstance.transaction([storeName], "readwrite").objectStore(storeName).put(stateObj);
    }

    function loadApplicationStateFromDatabase() {
        if (!dbInstance) { loadPageLayout('workspacePage'); return; }
        const request = dbInstance.transaction([storeName], "readonly").objectStore(storeName).get("session_state");

        request.onsuccess = (e) => {
            const state = e.target.result;
            if (state) {
                if(state.formConfigStateCache) formConfigStateCache = state.formConfigStateCache;
                if(state.grid1Data) grid1Storage = state.grid1Data;
                if(state.orderBulkMap) orderBulkMap = state.orderBulkMap;
            }
            
            restoreHeaderMonthValue();
            applyTimeSelectionFilters();
            loadPageLayout('workspacePage');
        };
        request.onerror = () => loadPageLayout('workspacePage');
    }

    function restoreHeaderMonthValue() {
        const em = document.getElementById('gEntryMonth');
        if (!em) return;

        const entryVal = formConfigStateCache.entryMonth || "JULY-2026";
        em.value = entryVal;
        
        const parts = entryVal.split("-");
        if (parts.length === 2 && !isNaN(parts[1])) {
            calendarActiveYear = parseInt(parts[1]);
        }
    }

    /* ASYNCHRONOUS PAGE ROUTER */
    async function loadPageLayout(targetPageId) {
        const viewport = document.getElementById('portoRouterViewport');
        if (!viewport) return;

        const templateNode = document.getElementById(`tpl-${targetPageId}`);
        viewport.replaceChildren(templateNode.content.cloneNode(true));

        if (targetPageId === 'workspacePage') {
            applyTimeSelectionFilters(); 
            initializeWorkspacePageListeners();
        }

        saveApplicationStateToDatabase();
    }

    /* RENDERING FILTERS & SORTING */
    function applyTimeSelectionFilters() {
        const monthYearParts = (formConfigStateCache.entryMonth || "JULY-2026").split("-");
        const matchToken = `${monthYearParts[0]}-${monthYearParts[1]}`.trim().toUpperCase();

        const filtered = [];
        for (let i = 0; i < grid1Storage.length; i++) {
            const row = grid1Storage[i];
            if (row && String(row["MonthAndYear"] || "").trim().toUpperCase() === matchToken) {
                filtered.push(row);
            }
        }
        currentFilteredGrid1Data = filtered;

        currentFilteredGrid1Data.sort((a, b) => {
            return String(b["Order No."] || "").localeCompare(String(a["Order No."] || ""), undefined, { numeric: true, sensitivity: 'base' });
        });
    }

    /* GROUP RAW ITEMS INTO ORDER ENTRIES FOR DATA GRID VIEW */
    function getGroupedOrders(filteredRecords) {
        const orderMap = new Map();

        filteredRecords.forEach(row => {
            const orderNo = row["Order No."];
            if (!orderMap.has(orderNo)) {
                orderMap.set(orderNo, {
                    orderNo: orderNo,
                    description: row["Description"] || "",
                    monthAndYear: row["MonthAndYear"] || "",
                    date: row["Date"] || new Date().toISOString().split('T')[0],
                    items: []
                });
            }
            orderMap.get(orderNo).items.push(row);
        });

        const groupedList = [];
        orderMap.forEach((data, orderNo) => {
            let incomeSum = 0;
            let expenseSum = 0;
            const categoryTags = [];

            data.items.forEach(item => {
                const amt = parseFloat(item["Amount"]) || 0;
                const type = item["Type"] || "Expense";
                
                if (type === "Income") {
                    incomeSum += amt;
                } else {
                    expenseSum += amt;
                }

                categoryTags.push({
                    category: item["Category"],
                    type: type,
                    amount: amt
                });
            });

            const netCategorySum = incomeSum - expenseSum;

            const bulkData = orderBulkMap[orderNo];
            let hasManualBulk = bulkData && bulkData.amount !== undefined && bulkData.amount !== null && bulkData.amount !== "";

            let manualBulkVal = 0;
            let bulkType = "Expense";

            if (hasManualBulk) {
                manualBulkVal = parseFloat(bulkData.amount) || 0;
                bulkType = bulkData.type || "Expense";
            } else if (typeof bulkData === "number" || typeof bulkData === "string") {
                hasManualBulk = true;
                manualBulkVal = parseFloat(bulkData) || 0;
                bulkType = "Expense";
            }

            const effectiveSubtotal = hasManualBulk 
                ? (bulkType === "Income" ? manualBulkVal : -manualBulkVal)
                : netCategorySum;

            groupedList.push({
                orderNo: orderNo,
                description: data.description,
                monthAndYear: data.monthAndYear,
                date: data.date,
                categoryTags: categoryTags,
                incomeSum: incomeSum,
                expenseSum: expenseSum,
                netCategorySum: netCategorySum,
                bulkAmount: manualBulkVal,
                bulkType: bulkType,
                isManualBulk: hasManualBulk,
                subtotal: effectiveSubtotal,
                rawItems: data.items
            });
        });

        return groupedList;
    }

    /* DASHBOARD SUMMARY CALCULATIONS */
    function renderDashboardSummaries() {
        const todayStr = new Date().toISOString().split('T')[0];
        const currentSelectedMonthYear = formConfigStateCache.entryMonth || "JULY-2026";
        const currentSelectedKey = getMonthSortKey(currentSelectedMonthYear);
        const selectedYear = currentSelectedMonthYear.split('-')[1] || "2026";

        let todayInc = 0, todayExp = 0;
        let monthInc = 0, monthExp = 0;
        let yearInc = 0, yearExp = 0;
        let carryoverBalance = 0;

        const allOrderMap = new Map();
        grid1Storage.forEach(row => {
            const oNo = row["Order No."];
            if (!allOrderMap.has(oNo)) {
                allOrderMap.set(oNo, {
                    orderNo: oNo,
                    date: row["Date"] || todayStr,
                    monthAndYear: row["MonthAndYear"] || "",
                    items: []
                });
            }
            allOrderMap.get(oNo).items.push(row);
        });

        allOrderMap.forEach((data, oNo) => {
            let inc = 0, exp = 0;
            const oKey = getMonthSortKey(data.monthAndYear);
            const oYear = (data.monthAndYear || "").split('-')[1];

            const bulkData = orderBulkMap[oNo];
            const hasManualBulk = bulkData && bulkData.amount !== undefined && bulkData.amount !== null && bulkData.amount !== "";

            if (hasManualBulk) {
                const bAmt = parseFloat(bulkData.amount) || 0;
                const bType = bulkData.type || "Expense";
                if (bType === "Income") inc = bAmt;
                else exp = bAmt;
            } else if (typeof bulkData === "number" || typeof bulkData === "string") {
                exp = parseFloat(bulkData) || 0;
            } else {
                data.items.forEach(item => {
                    const amt = parseFloat(item["Amount"]) || 0;
                    if (item["Type"] === "Income") inc += amt;
                    else exp += amt;
                });
            }

            const netOrderAmount = inc - exp;

            if (oKey < currentSelectedKey) {
                carryoverBalance += netOrderAmount;
            }

            if (data.date === todayStr) {
                todayInc += inc;
                todayExp += exp;
            }

            if (data.monthAndYear === currentSelectedMonthYear) {
                monthInc += inc;
                monthExp += exp;
            }

            if (oYear === selectedYear) {
                yearInc += inc;
                yearExp += exp;
            }
        });

        const todayBal = todayInc - todayExp;
        const monthNet = monthInc - monthExp;
        const monthTotalBalance = monthNet + carryoverBalance;
        const yearBal = yearInc - yearExp;

        const formatVal = (v) => (v >= 0 ? `+${v.toFixed(2)}` : `${v.toFixed(2)}`);
        const getColorClass = (v) => (v >= 0 ? 'text-success' : 'text-danger');

        const elTodayInc = document.getElementById('dashTodayInc');
        const elTodayExp = document.getElementById('dashTodayExp');
        const elTodayBal = document.getElementById('dashTodayBal');
        if (elTodayInc) elTodayInc.innerText = todayInc.toFixed(2);
        if (elTodayExp) elTodayExp.innerText = todayExp.toFixed(2);
        if (elTodayBal) {
            elTodayBal.innerText = formatVal(todayBal);
            elTodayBal.className = `fw-bold ${getColorClass(todayBal)}`;
        }

        const elMonthInc = document.getElementById('dashMonthInc');
        const elMonthExp = document.getElementById('dashMonthExp');
        const elMonthCarry = document.getElementById('dashMonthCarry');
        const elMonthBal = document.getElementById('dashMonthBal');
        const elMonthLabel = document.getElementById('dashMonthLabel');
        if (elMonthLabel) elMonthLabel.innerText = currentSelectedMonthYear;
        if (elMonthInc) elMonthInc.innerText = monthInc.toFixed(2);
        if (elMonthExp) elMonthExp.innerText = monthExp.toFixed(2);
        if (elMonthCarry) elMonthCarry.innerText = formatVal(carryoverBalance);
        if (elMonthBal) {
            elMonthBal.innerText = formatVal(monthTotalBalance);
            elMonthBal.className = `fw-bold ${getColorClass(monthTotalBalance)}`;
        }

        const elYearInc = document.getElementById('dashYearInc');
        const elYearExp = document.getElementById('dashYearExp');
        const elYearBal = document.getElementById('dashYearBal');
        const elYearLabel = document.getElementById('dashYearLabel');
        if (elYearLabel) elYearLabel.innerText = `Year ${selectedYear}`;
        if (elYearInc) elYearInc.innerText = yearInc.toFixed(2);
        if (elYearExp) elYearExp.innerText = yearExp.toFixed(2);
        if (elYearBal) {
            elYearBal.innerText = formatVal(yearBal);
            elYearBal.className = `fw-bold ${getColorClass(yearBal)}`;
        }
    }

    function initializeWorkspacePageListeners() {
        const grid1Header = document.getElementById('grid1Header');
        if (grid1Header) {
            grid1Header.innerHTML = `<th style="width: 140px; text-align: center;">ACTIONS</th>` + 
                grid1DisplayFields.map(f => `<th>${f}</th>`).join('');
        }

        document.querySelectorAll('.pagination-trigger').forEach(btn => {
            btn.addEventListener('click', () => {
                changeGridPage(parseInt(btn.getAttribute('data-grid')), parseInt(btn.getAttribute('data-dir')));
            });
        });

        const grid1Body = document.getElementById('grid1Body');
        if (grid1Body) {
            grid1Body.addEventListener('click', (e) => {
                const btn = e.target.closest('.grid-action-btn');
                if (!btn) return;
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (isNaN(idx)) return;
                if (btn.classList.contains('action-view')) toggleGrid1InlineDetails(idx);
                else if (btn.classList.contains('action-edit')) editGrid1RowModal(idx);
                else if (btn.classList.contains('action-del')) deleteGrid1SingleRow(idx);
            });
        }
        
        currentGrid1Page = 1;
        renderGrid1();
    }

                                    <i class="fa-solid fa-calculator text-secondary me-1"></i> Bulk Amount Override

                                </div>

                                    <select class="form-select" id="mBulkType">
                                        <option value="">-- Select Type --</option>
                                        <option value="Expense">Expense</option>

                </div>
            </div>
        `;

        const closeModal = () => modalContainer.innerHTML = '';
        document.getElementById('btnCloseOrderModalTop').onclick = closeModal;
        document.getElementById('btnCloseOrderModalBot').onclick = closeModal;

        const catInput = document.getElementById('mCategoryInput');
        const tagListContainer = document.getElementById('categoryTagList');
        const catSugBox = document.getElementById('modalCategorySuggestions');

        function renderCategoryTags() {
            tagListContainer.innerHTML = '';
            pendingCategoryItems.forEach((item, index) => {
                const badge = document.createElement('span');
                const badgeBg = item.type === 'Income' ? 'bg-success' : 'bg-danger';
                badge.className = `badge ${badgeBg} d-inline-flex align-items-center gap-1 px-2 py-1`;
                badge.style.fontSize = '12px';
                
                badge.innerHTML = `
                    <span>${item.category} (${item.type})</span>
                    <span style="cursor:pointer; margin-left:4px; font-weight:bold;" data-idx="${index}">&times;</span>
                `;
                badge.querySelector('span:last-child').onclick = () => {
                    pendingCategoryItems.splice(index, 1);
                    renderCategoryTags();
                    catInput.focus();
                };
                tagListContainer.appendChild(badge);
            });
        }

        function processCategoryInputItem(rawVal, callback) {
            const cleanVal = toProperCase(rawVal.replace(/,/g, '').trim());
            if (!cleanVal) {
                if (callback) callback();
                catInput.focus();
                return;
            }

            const knownCategories = getCategorySuggestions();
            const existing = knownCategories.find(c => c.category.toLowerCase() === cleanVal.toLowerCase());

            if (existing) {
                pendingCategoryItems.push({
                    category: existing.category,
                    type: existing.type,
                    amount: 0
                });
                renderCategoryTags();
                catInput.value = '';
                catInput.focus();
                if (callback) callback();
            } else {
                promptCategoryTypeModal(cleanVal, (selectedType) => {
                    pendingCategoryItems.push({
                        category: cleanVal,
                        type: selectedType,
                        amount: 0
                    });
                    renderCategoryTags();
                    catInput.value = '';
                    catInput.focus();
                    if (callback) callback();
                });
            }
        }

        catInput.addEventListener('input', () => {
            if (catInput.value.includes(',')) {
                const parts = catInput.value.split(',');
                const tagCandidate = parts[0];
                catInput.value = parts.slice(1).join(',');
                catSugBox.style.display = 'none';
                processCategoryInputItem(tagCandidate);
            } else {
                const val = catInput.value.toLowerCase().trim();
                const categories = getCategorySuggestions();
                const matched = val ? categories.filter(c => c.category.toLowerCase().includes(val)) : categories;

                if (matched.length > 0) {
                    catSugBox.innerHTML = matched.map(c => 
                        `<div class="autocomplete-suggestion" data-cat="${c.category}">${c.category} <span class="text-secondary">(${c.type})</span></div>`
                    ).join('');
                    catSugBox.style.display = 'block';
                } else {
                    catSugBox.style.display = 'none';
                }
            }
        });

        catInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (catInput.value.trim()) {
                    catSugBox.style.display = 'none';
                    processCategoryInputItem(catInput.value);
                }
            }
        });

        catSugBox.addEventListener('click', (e) => {
            const suggestItem = e.target.closest('.autocomplete-suggestion');
            if (suggestItem) {
                const selectedCat = suggestItem.getAttribute('data-cat') || suggestItem.innerText;
                catSugBox.style.display = 'none';
                processCategoryInputItem(selectedCat);
            }
        });

        document.getElementById('formCreateOrder').onsubmit = (e) => {
            e.preventDefault();

            const finalizeOrder = () => {
                if (pendingCategoryItems.length === 0) {
                    showNotification("Please add at least one category item.", "warning");
                    catInput.focus();
                    return;
                }

                const rawBulkAmtInput = document.getElementById('mAmount').value.trim();
                const bulkType = document.getElementById('mBulkType').value;
                const hasBulkAmount = rawBulkAmtInput !== "" && !isNaN(parseFloat(rawBulkAmtInput));

                if (hasBulkAmount && !bulkType) {
                    showNotification("Please select a Type (Expense or Income) for the bulk amount before saving.", "warning");
                    return;
                }

                const bulkValue = hasBulkAmount ? parseFloat(rawBulkAmtInput) : 0;
                const description = document.getElementById('mDescription').value.trim();

                const monthYearParts = (formConfigStateCache.entryMonth || "JULY-2026").split("-");
                const entryMonthFormattedString = `${monthYearParts[0] || 'JULY'}-${monthYearParts[1] || '2026'}`;
                const todayFormattedDate = new Date().toISOString().split('T')[0];

                if (hasBulkAmount) {
                    orderBulkMap[generatedOrderNo] = {
                        amount: bulkValue,
                        type: bulkType
                    };
                } else {
                    delete orderBulkMap[generatedOrderNo];
                }

                pendingCategoryItems.forEach(item => {
                    const recordObj = {
                        "Order No.": generatedOrderNo,
                        "Type": item.type,
                        "Category": item.category,
                        "Description": description,
                        "Amount": "0.00",
                        "MonthAndYear": entryMonthFormattedString,
                        "Date": todayFormattedDate
                    };
                    grid1Storage.push(recordObj);
                });

                applyTimeSelectionFilters();
                modalContainer.innerHTML = '';
                showNotification(`Order ${generatedOrderNo} created successfully.`, "success");

                renderGrid1();
                saveApplicationStateToDatabase();
            };

            if (catInput.value.trim()) {
                processCategoryInputItem(catInput.value, finalizeOrder);
            } else {
                finalizeOrder();
            }
        };
    }

    /* GRID 1 RENDERING SYSTEM WITH DESCRIPTION COLUMN & INLINE DETAILED EXPANSION */
    function renderGrid1() {
        const countLabel = document.getElementById('grid1Count');
        if (!countLabel) return;
        
        let groupedOrders = getGroupedOrders(currentFilteredGrid1Data);

        countLabel.innerText = `${groupedOrders.length} Orders`;

        const tbody = document.getElementById('grid1Body');
        if (!tbody) return;
        
        if (!groupedOrders.length) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted font-monospace">No order records found for current timeframe.</td></tr>`;
            const pageIndicator = document.getElementById('g1PageIndicator');
            if (pageIndicator) pageIndicator.innerText = "Page 1 / 1";
            renderDashboardSummaries();
            return;
        }

        const totalPages = Math.ceil(groupedOrders.length / maxRowsPerPage) || 1;
        if (currentGrid1Page > totalPages) currentGrid1Page = totalPages;
        
        const pageIndicator = document.getElementById('g1PageIndicator');
        if (pageIndicator) pageIndicator.innerText = `Page ${currentGrid1Page} / ${totalPages}`;
        
        const startIdx = (currentGrid1Page - 1) * maxRowsPerPage;
        const sliceData = groupedOrders.slice(startIdx, startIdx + maxRowsPerPage);

        const frag = document.createDocumentFragment();
        
        sliceData.forEach((order, idx) => {
            const globalIdx = startIdx + idx;
            const isExpanded = expandedOrderNos.has(order.orderNo);

            const tr = document.createElement('tr');
            
            // Actions Column

            actionTd.className = "text-center";

            actionTd.innerHTML = `

                        <i class="fa-solid ${isExpanded ? 'fa-minus text-danger' : 'fa-plus text-primary'}"></i>
                    </button>
                    <button type="button" class="grid-action-btn action-edit" data-idx="${globalIdx}" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button type="button" class="grid-action-btn btn-act-delete action-del" data-idx="${globalIdx}" title="Delete"><i class="fa-solid fa-trash"></i></button>

            tr.appendChild(actionTd);

            // 1. Order No.

            tdOrderNo.innerText = order.orderNo;
            tr.appendChild(tdOrderNo);

            // 2. Description (NEW FIELD IN DATAGRID)

                                    </div>

                                    <div class="p-2 border bg-light rounded" style="font-size:12px;">

    /* INLINE DATAGRID EXPANSION TOGGLE */
    function toggleGrid1InlineDetails(groupedIdx) {
        const groupedOrders = getGroupedOrders(currentFilteredGrid1Data);
        const targetOrder = groupedOrders[groupedIdx];
        if (!targetOrder) return;

        if (expandedOrderNos.has(targetOrder.orderNo)) {
            expandedOrderNos.delete(targetOrder.orderNo);
        } else {
            expandedOrderNos.add(targetOrder.orderNo);
        }

        renderGrid1();
    }

                        </div>

                            <button class="btn-porto-primary" id="btnEditSave" title="Save Changes"><i class="fa-solid fa-floppy-disk me-1"></i> Save Changes</button>
                        </div>
                    </div>
                </div>
            `;

            bindModalEvents();
        }

        function syncInputStateToEditingItems() {
            const rows = container.querySelectorAll('.cat-item-row');
            rows.forEach(row => {
                const idx = parseInt(row.getAttribute('data-item-idx'));
                if (!isNaN(idx) && currentEditingItems[idx]) {
                    const catEl = row.querySelector('.edit-cat-name');
                    const typeEl = row.querySelector('.edit-cat-type');
                    const amtEl = row.querySelector('.edit-cat-amt');

                    if (catEl) currentEditingItems[idx]["Category"] = catEl.value;
                    if (typeEl) currentEditingItems[idx]["Type"] = typeEl.value;
                    if (amtEl) currentEditingItems[idx]["Amount"] = amtEl.value;
                }
            });
        }

        function bindModalEvents() {
            document.getElementById('btnEditCloseTop').onclick = () => container.innerHTML = '';
            document.getElementById('btnEditCloseBot').onclick = () => container.innerHTML = '';

            const editBulkAmt = container.querySelector('#mEditBulkAmount');
            if (editBulkAmt) {
                editBulkAmt.addEventListener('focus', (e) => e.target.select());
            }

            const itemsContainer = container.querySelector('#editCategoryItemsContainer');
            if (itemsContainer) {
                itemsContainer.addEventListener('focusin', (e) => {
                    if (e.target.classList.contains('edit-cat-amt')) {
                        e.target.select();
                    }
                });

                itemsContainer.addEventListener('click', (e) => {
                    const btnDel = e.target.closest('.btn-remove-category-item');
                    if (btnDel) {
                        const targetIdx = parseInt(btnDel.getAttribute('data-item-idx'));
                        if (!isNaN(targetIdx)) {
                            syncInputStateToEditingItems();
                            currentEditingItems.splice(targetIdx, 1);
                            renderEditModalContent();
                        }
                    }
                });
            }

            document.getElementById('btnEditSave').onclick = () => {
                syncInputStateToEditingItems();

                if (currentEditingItems.length === 0) {
                    showNotification("Order must contain at least one category item. Otherwise, delete the whole order.", "warning");
                    return;
                }

                const desc = document.getElementById('mEditDescription').value.trim();
                const rawBulkInput = document.getElementById('mEditBulkAmount').value.trim();
                const editBulkType = document.getElementById('mEditBulkType').value;
                const hasManualBulk = rawBulkInput !== "" && !isNaN(parseFloat(rawBulkInput));

                if (hasManualBulk && !editBulkType) {
                    showNotification("Please select a Type (Expense or Income) for the bulk amount.", "warning");
                    return;
                }

                if (hasManualBulk) {
                    orderBulkMap[targetOrder.orderNo] = {
                        amount: parseFloat(rawBulkInput),
                        type: editBulkType
                    };
                } else {
                    delete orderBulkMap[targetOrder.orderNo];
                }

                grid1Storage = grid1Storage.filter(r => r["Order No."] !== targetOrder.orderNo);

                currentEditingItems.forEach(item => {
                    grid1Storage.push({
                        "Order No.": targetOrder.orderNo,
                        "Type": item["Type"] || "Expense",
                        "Category": toProperCase(item["Category"] || ""),
                        "Description": desc,
                        "Amount": hasManualBulk ? "0.00" : (parseFloat(item["Amount"]) ? parseFloat(item["Amount"]).toFixed(2) : "0.00"),
                        "MonthAndYear": targetOrder.monthAndYear,
                        "Date": targetOrder.date
                    });
                });

                applyTimeSelectionFilters();
                renderGrid1();
                saveApplicationStateToDatabase();
                container.innerHTML = '';
                showNotification(`Updated details for Order ${targetOrder.orderNo}.`, "success");
            };
        }

        renderEditModalContent();
    }

    function deleteGrid1SingleRow(groupedIdx) {
        const groupedOrders = getGroupedOrders(currentFilteredGrid1Data);
        const targetOrder = groupedOrders[groupedIdx];
        if (!targetOrder) return;

        showConfirmModal(`Permanently delete Order ${targetOrder.orderNo} and all its categories?`, () => {
            grid1Storage = grid1Storage.filter(r => r["Order No."] !== targetOrder.orderNo);
            delete orderBulkMap[targetOrder.orderNo];
            expandedOrderNos.delete(targetOrder.orderNo);

            applyTimeSelectionFilters();
            renderGrid1();
            saveApplicationStateToDatabase();
            showNotification("Order successfully removed.", "danger");
        });
    }

    function changeGridPage(targetGridId, directionalIncrement) {
        let groupedOrders = getGroupedOrders(currentFilteredGrid1Data);
        
        const totalPages = Math.ceil(groupedOrders.length / maxRowsPerPage) || 1;
        let targetPage = currentGrid1Page + directionalIncrement;
        if (targetPage >= 1 && targetPage <= totalPages) { 
            currentGrid1Page = targetPage; 
            renderGrid1(); 
        }
    }

    function clearGrid1DataStore() {
        if(!currentFilteredGrid1Data.length) return;
        showConfirmModal("Are you sure you want to delete all entries inside this month's frame?", () => {
            const monthYearParts = (formConfigStateCache.entryMonth || "JULY-2026").split("-");
            const matchToken = `${monthYearParts[0]}-${monthYearParts[1]}`;
            
            grid1Storage = grid1Storage.filter(row => 
                String(row["MonthAndYear"]).trim().toUpperCase() !== matchToken
            );
            expandedOrderNos.clear();

            applyTimeSelectionFilters();
            currentGrid1Page = 1;
            renderGrid1();
            saveApplicationStateToDatabase();
            showNotification("Cleared timeframe records from Data Grid 1.", "danger");
        });
    }

    /* PROFESSIONAL PRINTABLE PDF REPORT GENERATOR */
    function generateProfessionalPdfReport(params) {
        let filteredItems = grid1Storage.filter(row => {
            // Period filter
            if (params.periodType === 'Monthly') {
                if (String(row["MonthAndYear"] || "").trim().toUpperCase() !== params.valMonth) return false;
            } else if (params.periodType === 'Daily') {
                if (String(row["Date"] || "") !== params.valDate) return false;
            } else if (params.periodType === 'Yearly') {
                const rowYear = String(row["MonthAndYear"] || "").split('-')[1] || "";
                if (rowYear !== params.valYear) return false;
            }

            // Category filter
            if (params.category !== 'ALL') {
                if (String(row["Category"] || "").toLowerCase() !== params.category.toLowerCase()) return false;
            }

            // Type filter
            if (params.type !== 'ALL') {
                if (String(row["Type"] || "") !== params.type) return false;
            }

            return true;
        });

        if (filteredItems.length === 0) {
            showNotification("No records match the selected PDF report criteria.", "warning");
            return;
        }

        const groupedMap = new Map();
        filteredItems.forEach(row => {
            const oNo = row["Order No."];
            if (!groupedMap.has(oNo)) {
                groupedMap.set(oNo, {
                    orderNo: oNo,
                    description: row["Description"] || "",
                    monthAndYear: row["MonthAndYear"] || "",
                    date: row["Date"] || "",
                    items: []
                });
            }
            groupedMap.get(oNo).items.push(row);
        });

        let reportTotalInc = 0;
        let reportTotalExp = 0;
        const categorySummaryMap = new Map();

        const orderRowsHtml = [];

        groupedMap.forEach((data, oNo) => {
            let orderInc = 0;
            let orderExp = 0;
            const catDetails = [];

            data.items.forEach(item => {
                const amt = parseFloat(item["Amount"]) || 0;
                const type = item["Type"] || "Expense";
                const cat = item["Category"] || "Uncategorized";

                if (type === "Income") orderInc += amt;
                else orderExp += amt;

                catDetails.push(`${cat} (${type}${amt > 0 ? ': ' + amt.toFixed(2) : ''})`);

                if (!categorySummaryMap.has(cat)) {
                    categorySummaryMap.set(cat, { category: cat, type: type, count: 0, totalAmount: 0 });
                }
                const cStat = categorySummaryMap.get(cat);
                cStat.count += 1;
                cStat.totalAmount += amt;
            });

            const bulkData = orderBulkMap[oNo];
            const hasManualBulk = bulkData && bulkData.amount !== undefined && bulkData.amount !== null && bulkData.amount !== "";
            let effectiveSubtotal = 0;

            if (hasManualBulk) {
                const bVal = parseFloat(bulkData.amount) || 0;
                const bType = bulkData.type || "Expense";
                if (bType === "Income") {
                    reportTotalInc += bVal;
                    effectiveSubtotal = bVal;
                } else {
                    reportTotalExp += bVal;
                    effectiveSubtotal = -bVal;
                }
            } else {
                reportTotalInc += orderInc;
                reportTotalExp += orderExp;
                effectiveSubtotal = orderInc - orderExp;
            }

            const subtotalClass = effectiveSubtotal >= 0 ? 'text-success' : 'text-danger';

            orderRowsHtml.push(`
                <tr>
                    <td style="font-weight:bold;">${oNo}</td>
                    <td>${data.date || 'N/A'}</td>
                    <td>${data.monthAndYear || 'N/A'}</td>
                    <td>${data.description || '<em>None</em>'}</td>
                    <td>${catDetails.join(', ')}</td>
                    <td style="text-align:right; font-weight:bold;" class="${subtotalClass}">
                        ${(effectiveSubtotal >= 0 ? '+' : '') + effectiveSubtotal.toFixed(2)}
                        ${hasManualBulk ? '<div style="font-size:9px; color:#666;">(Bulk Override)</div>' : ''}
                    </td>
                </tr>
            `);
        });

        const netReportBalance = reportTotalInc - reportTotalExp;

        const categoryRowsHtml = [];
        categorySummaryMap.forEach(c => {
            const isInc = c.type === 'Income';
            categoryRowsHtml.push(`
                <tr>
                    <td style="font-weight:600;">${c.category}</td>
                    <td><span class="${isInc ? 'badge-inc' : 'badge-exp'}">${c.type}</span></td>
                    <td style="text-align:center;">${c.count}</td>
                    <td style="text-align:right; font-weight:bold;" class="${isInc ? 'val-inc' : 'val-exp'}">${c.totalAmount.toFixed(2)}</td>
                </tr>
            `);
        });

        let periodLabel = "All Time";
        if (params.periodType === 'Monthly') periodLabel = `Monthly (${params.valMonth})`;
        else if (params.periodType === 'Daily') periodLabel = `Daily (${params.valDate})`;
        else if (params.periodType === 'Yearly') periodLabel = `Yearly (${params.valYear})`;

        const reportWindow = window.open('', '_blank');
        if (!reportWindow) {
            showNotification("Pop-up blocked. Please allow pop-ups to view PDF report.", "danger");
            return;
        }

        reportWindow.document.write(`
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>FEM Financial Report - ${periodLabel}</title>
                <style>
                    @page { size: A4 portrait; margin: 12mm; }
                    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #4b465c; margin: 0; padding: 24px; font-size: 12px; line-height: 1.4; background: #fff; }
                    .no-print { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
                    .btn-action { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
                    .btn-print { background: #7367f0; color: #fff; }
                    .btn-print:hover { background: #655bd3; }
                    .btn-close { background: rgba(168, 170, 174, 0.16); color: #4b465c; }
                    
                    .report-header { border-bottom: 2px solid #7367f0; padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
                    .report-title { font-size: 22px; font-weight: 800; color: #7367f0; margin: 0; letter-spacing: -0.5px; }
                    .report-subtitle { font-size: 13px; color: #808390; margin-top: 4px; font-weight: 500; }
                    .meta-box { text-align: right; font-size: 11px; color: #808390; }
                    
                    .param-badge-container { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
                    .param-badge { background: #f8f7fa; border: 1px solid #e6e6e8; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #4b465c; }
                    
                    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
                    .summary-card { background: #f8f7fa; border: 1px solid #e6e6e8; border-radius: 6px; padding: 12px; text-align: center; }
                    .summary-card .label { font-size: 10px; color: #808390; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
                    .summary-card .val { font-size: 16px; font-weight: 800; margin-top: 4px; }
                    
                    .val-inc { color: #28c76f; }
                    .val-exp { color: #ea5455; }
                    .val-bal { color: #7367f0; }
                    .text-success { color: #28c76f; }
                    .text-danger { color: #ea5455; }
                    
                    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11px; }

                    td { padding: 8px 10px; border-bottom: 1px solid #e6e6e8; border-left: 1px solid #f8f7fa; border-right: 1px solid #f8f7fa; vertical-align: top; }
                    tr:nth-child(even) td { background-color: #f8f7fa; }
                    
                    .section-title { font-size: 13px; font-weight: 700; color: #4b465c; margin: 18px 0 10px 0; border-left: 4px solid #7367f0; padding-left: 8px; text-transform: uppercase; }
                    .badge-inc { background: rgba(40, 199, 111, 0.15); color: #28c76f; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight:bold; }
                    .badge-exp { background: rgba(234, 84, 85, 0.15); color: #ea5455; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight:bold; }
                    
                    .report-footer { margin-top: 30px; border-top: 1px solid #e6e6e8; padding-top: 12px; text-align: center; font-size: 10px; color: #808390; }

                    @media print {
                        .no-print { display: none !important; }
                        body { padding: 0; }
                        .summary-card { border: 1px solid #e6e6e8; }
                    }
                </style>
            </head>
            <body>
                <div class="no-print">
                    <button class="btn-action btn-close" onclick="window.close()">Close</button>
                    <button class="btn-action btn-print" onclick="window.print()">Print / Save as PDF</button>

                <div class="report-header">
                    <div>
                        <h1 class="report-title">FEM FINANCIAL STATEMENT</h1>

                    <span class="param-badge">Period: ${periodLabel}</span>
                    <span class="param-badge">Category Filter: ${params.category === 'ALL' ? 'All Categories' : params.category}</span>

    /* JSON EXPORT & IMPORT UTILITIES */
    function exportToJsonFile() {
        try {
            const exportData = {
                version: "1.0",
                exportDate: new Date().toISOString(),
                formConfigStateCache: formConfigStateCache,
                orderBulkMap: orderBulkMap,
                grid1Data: grid1Storage
            };

            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const currentMonthYearSelected = formConfigStateCache.entryMonth || "JULY-2026";
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = `FEM_Backup_${currentMonthYearSelected}.json`;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);

            showNotification("Data exported to JSON successfully.", "success");
        } catch (err) {
            console.error("Export error:", err);
            showNotification("Failed to export JSON file.", "danger");
        }
    }

    function importFromJsonFile(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const importedData = JSON.parse(e.target.result);

                if (!importedData || (!importedData.grid1Data && !importedData.orderBulkMap)) {
                    showNotification("Invalid or corrupted JSON file structure.", "danger");
                    return;
                }

                if (importedData.formConfigStateCache) {
                    formConfigStateCache = importedData.formConfigStateCache;
                }
                if (importedData.grid1Data && Array.isArray(importedData.grid1Data)) {
                    grid1Storage = importedData.grid1Data;
                }
                if (importedData.orderBulkMap && typeof importedData.orderBulkMap === 'object') {
                    orderBulkMap = importedData.orderBulkMap;
                }

                expandedOrderNos.clear();
                restoreHeaderMonthValue();
                applyTimeSelectionFilters();
                renderGrid1();
                saveApplicationStateToDatabase();

                showNotification("JSON data imported successfully!", "success");
            } catch (err) {
                console.error("Import error:", err);
                showNotification("Failed to parse JSON file.", "danger");
            } finally {
                event.target.value = '';
            }
        };

        reader.readAsText(file);
    }

    /* CATEGORY AUTOCOMPLETE SUGGESTIONS */
    function getCategorySuggestions() {
        const catMap = new Map();
        for (let i = grid1Storage.length - 1; i >= 0; i--) {
            const cName = grid1Storage[i]["Category"];
            const cType = grid1Storage[i]["Type"] || "Expense";
            if (cName && !catMap.has(cName.toLowerCase())) {
                catMap.set(cName.toLowerCase(), { category: cName, type: cType });
            }
        }
        return Array.from(catMap.values());
    }
})();
</script>
