<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metsis Studio - Workspace Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --apple-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg-canvas: #f5f5f7;
            --bg-sidebar: rgba(246, 246, 248, 0.82);
            --bg-navbar: rgba(255, 255, 255, 0.75);
            --bg-card: rgba(255, 255, 255, 0.85);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-focus: rgba(0, 113, 227, 0.4);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-brand: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.12);
            --shimmer-gradient: linear-gradient(90deg, rgba(0,0,0,0.04) 25%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 75%);
            --glass-blur: blur(25px) saturate(190%);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            --card-hover-shadow: 0 16px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            --apple-radius: 16px;
        }

        @supports not (backdrop-filter: blur(1px)) {
            :root {
                --bg-sidebar: #f6f6f8;
                --bg-navbar: #ffffff;
                --bg-card: #ffffff;
            }
        }
        
        body {
            background-color: var(--bg-canvas);
            color: var(--text-main);
            font-family: var(--apple-font);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 0.88rem;
            display: flex;
            overflow-x: hidden;
            letter-spacing: -0.011em;
        }

        /* macOS Window Header & Navbar */
        .zynix-navbar {
            background: var(--bg-navbar);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            height: 52px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1050;
            border-bottom: 1px solid var(--border-subtle);
        }

        .mac-traffic-lights {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-right: 12px;
        }

        .mac-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            transition: opacity 0.15s ease;
        }

        .mac-dot-close { background-color: #ff5f56; border: 0.5px solid rgba(0,0,0,0.12); }
        .mac-dot-minimize { background-color: #ffbd2e; border: 0.5px solid rgba(0,0,0,0.12); }
        .mac-dot-expand { background-color: #27c93f; border: 0.5px solid rgba(0,0,0,0.12); }

        /* macOS Glass Sidebar */
        .zynix-sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-subtle);
            position: fixed;
            top: 52px; bottom: 0; left: 0;
            z-index: 1040;
            padding: 1.25rem 0.85rem;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .zynix-main-viewport {
            margin-left: 240px;
            flex-grow: 1;
            min-width: 0;
            padding-top: 52px;
        }

        .sidebar-section-label {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0 0.75rem 0.5rem 0.75rem;
        }

        .sidebar-menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.52rem 0.75rem;
            color: #3a3a3c;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.86rem;
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            margin-bottom: 0.2rem;
        }

        .sidebar-menu-item:hover {
            background: rgba(0, 0, 0, 0.04);
            color: var(--accent-brand);
        }

        .sidebar-menu-item.active {
            background: var(--accent-brand);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.25);
        }

        /* Apple Spotlight Search Field */
        .search-container-shell {
            background: rgba(238, 238, 240, 0.85);
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 3px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-container-shell:focus-within {
            background: #ffffff;
            border-color: var(--accent-brand);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .form-input-minimal {
            background: transparent !important;
            border: none !important;
            color: var(--text-main) !important;
            font-size: 0.88rem;
        }

        .form-input-minimal:focus { box-shadow: none !important; }
        .btn-reset-field { color: var(--text-muted); border: none; background: transparent; transition: color 0.15s; }
        .btn-reset-field:hover { color: var(--text-main); }

        .btn-apple-action {
            background-color: var(--accent-brand) !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            font-weight: 500;
            font-size: 0.84rem;
            padding: 0.45rem 1.25rem;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
        }

        .btn-apple-action:hover:not(:disabled) {
            background-color: #0077ed !important;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
            transform: translateY(-1px);
        }

        .btn-apple-action:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Apple App Cards */
        .video-card-wrapper {
            content-visibility: auto;
            contain-intrinsic-size: 300px;
        }

        .video-card {
            background: var(--bg-card) !important;
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8) !important;
            border-radius: var(--apple-radius) !important;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .video-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--card-hover-shadow);
            border-color: rgba(0, 113, 227, 0.3) !important;
        }

        .video-card .card-img-top {
            border-radius: 12px 12px 0 0;
            transition: transform 0.3s ease;
        }

        .video-card.border-active-track {
            border-color: var(--accent-brand) !important;
            background: #ffffff !important;
            box-shadow: 0 0 0 3px var(--accent-glow), var(--card-hover-shadow);
        }

        .badge-zynix {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-zynix-video { 
            background: rgba(255, 59, 48, 0.12); 
            color: #ff3b30; 
        }
        .badge-zynix-playlist { 
            background: rgba(0, 113, 227, 0.12); 
            color: var(--accent-brand); 
        }

        /* Apple Glass Suggestions Popover */
        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            z-index: 1060;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            display: none;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
            padding: 4px;
        }
        .suggestions-dropdown.show { display: block; }
        .suggestion-item {
            background: transparent; 
            border: none; 
            width: 100%; 
            text-align: left;
            border-radius: 8px;
            color: var(--text-main); 
            padding: 8px 12px;
            font-size: 0.85rem;
            transition: all 0.15s ease;
        }
        .suggestion-item:hover { 
            background: var(--accent-brand) !important; 
            color: #ffffff !important; 
        }
        .suggestion-item:hover .badge {
            background: rgba(255,255,255,0.2) !important;
            color: #ffffff !important;
            border-color: transparent !important;
        }

        /* macOS Theater Stage Overlay */
        .modal-fullscreen-theater .modal-content { 
            background: rgba(20, 20, 22, 0.85) !important; 
            backdrop-filter: blur(35px) brightness(0.8);
            -webkit-backdrop-filter: blur(35px) brightness(0.8);
            height: 100vh; 
        }
        .modal-fullscreen-theater .modal-header { 
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-subtle); 
            padding: 0.85rem 1.25rem; 
        }
        .modal-fullscreen-theater .modal-footer {
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--border-subtle); 
            padding: 0.85rem 1.25rem; 
        }
        .modal-fullscreen-theater .modal-body { 
            background: #000000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
        
        .btn-theater-control { 
            background: rgba(120, 120, 128, 0.12); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            color: var(--text-main) !important; 
            font-weight: 500; 
            font-size: 0.85rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-theater-control:hover:not(:disabled) { 
            background: var(--accent-brand); 
            border-color: var(--accent-brand); 
            color: #ffffff !important; 
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        /* Loading Shimmer */
        .loading-shimmer .video-card { pointer-events: none; position: relative; }
        .loading-shimmer .video-card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--shimmer-gradient); background-size: 200% 100%;
            animation: appleShimmer 1.4s infinite linear; z-index: 5;
        }
        @keyframes appleShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Mobile Drawer & Backdrop */
        .sidebar-backdrop {
            position: fixed; top: 0; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1035; display: none;
        }

        @media (max-width: 991.98px) {
            .zynix-sidebar { transform: translateX(-100%); top: 0; height: 100vh; }
            .zynix-sidebar.show-sidebar { transform: translateX(0); box-shadow: 0 0 32px rgba(0,0,0,0.15); }
            .zynix-main-viewport { margin-left: 0; }
            .sidebar-backdrop.show-sidebar { display: block; }
        }

        /* Apple Pill User Avatar */
        .user-pill {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-subtle);
            padding: 4px 10px 4px 6px;
            border-radius: 980px;
            font-size: 0.8rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- macOS Navigation / Titlebar -->
    <header class="zynix-navbar d-flex align-items-center justify-content-between px-3">
        <div class="d-flex align-items-center gap-2">
            <!-- macOS Window Controls -->
            <div class="mac-traffic-lights d-none d-lg-flex">
                <span class="mac-dot mac-dot-close"></span>
                <span class="mac-dot mac-dot-minimize"></span>
                <span class="mac-dot mac-dot-expand"></span>
            </div>

            <button class="btn btn-light border d-lg-none py-1 px-2 rounded-2" id="toggleSidebarBtn">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
            </button>

            <div class="fw-semibold d-flex align-items-center gap-2 text-dark ms-1" style="font-size: 0.95rem; letter-spacing: -0.02em;">
                <svg width="18" height="18" fill="var(--accent-brand)" viewBox="0 0 16 16"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 15 10.5v3a1.5 1.5 0 0 1-1.5 15h-3a1.5 1.5 0 0 1-1.5-1.5v-3z"/></svg>
                <span>Metsis Studio</span>
            </div>
        </div>

        <div class="d-flex align-items-center">
            <div class="user-pill d-flex align-items-center gap-2 fw-medium">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold" style="width: 22px; height: 22px; font-size: 0.65rem; background-color: var(--accent-brand) !important;">
                    MR
                </div>
                <span>M.R. RONY</span>
            </div>
        </div>
    </header>

    <!-- macOS Sidebar Container -->
    <aside class="zynix-sidebar" id="zynixSidebar">
        <div class="d-flex align-items-center justify-content-between mb-3 d-lg-none">
            <span class="sidebar-section-label p-0">NAVIGATION</span>
            <button class="btn border-0 p-1" id="closeSidebarBtn">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
            </button>
        </div>

        <div class="sidebar-section-label d-none d-lg-block">Workspace</div>
        <nav class="d-flex flex-column">
            <div class="sidebar-menu-item active" data-target="dashboard">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4H2.5z"/></svg> 
                Dashboard
            </div>
            <div class="sidebar-menu-item" data-target="discover">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.5-12.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0zm0 2a.5.5 0 1 1-1 0V11a.5.5 0 1 1-1 0v-4.5a.5.5 0 0 1 1 0V11a1.5 1.5 0 0 0 3 0V5.5a.5.5 0 0 1-1 0V11a.5.5 0 0 1-.5.5z"/></svg> 
                Discover
            </div>
            <div class="sidebar-menu-item" data-target="playlists">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M2 3a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 0-1h-11A.5.5 0 0 0 2 3zm2 4a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 0-1h-7A.5.5 0 0 0 4 7zm3 4a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 0-1h-2a.5.5 0 0 0-.5.5z"/></svg> 
                Playlists
            </div>
            <div class="sidebar-menu-item" data-target="history">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8.5 5.6a.5.5 0 1 0-1 0v2.9a.5.5 0 0 0 .223.418l2 1.3a.5.5 0 1 0 .554-.836L8.5 8.144V5.6z"/><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8z"/></svg> 
                History
            </div>
        </nav>
    </aside>

    <!-- Main Viewport Canvas -->
    <div class="zynix-main-viewport d-flex flex-column">
        <main class="container-fluid px-4 py-4 flex-grow-1">
            
            <!-- Apple Spotlight Search Section -->
            <div id="searchSectionWrapper" class="row mb-4">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="position-relative" id="searchSystemWrapper">
                        <div class="search-container-shell d-flex align-items-center">
                            <div class="input-group align-items-center">
                                <span class="input-group-text bg-transparent border-0 ps-3 pe-1">
                                    <svg width="14" height="14" fill="var(--text-muted)" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
                                </span>
                                <input type="text" id="searchInput" class="form-control form-input-minimal py-2" placeholder="Search streams, parameters or playlists..." autocomplete="off">
                                <button class="btn btn-reset-field d-none px-2 me-1" type="button" id="clearBtn">
                                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>
                                </button>
                                <button class="btn btn-apple-action" type="button" id="searchBtn">
                                    <span class="spinner-border spinner-border-sm d-none me-2" id="searchSpinner" role="status" aria-hidden="true"></span>
                                    Discover
                                </button>
                            </div>
                        </div>
                        <div class="list-group suggestions-dropdown" id="suggestionsPanel" role="listbox"></div>
                    </div>
                </div>
            </div>

            <!-- Header Section Title -->
            <div id="viewHeaderSegment" class="d-flex align-items-center justify-content-between mb-4 d-none">
                <h2 class="h5 fw-bold m-0" style="letter-spacing: -0.02em;" id="viewSectionTitle">Content Stream</h2>
                <div id="historyActionDeck" class="d-none">
                    <button class="btn btn-sm btn-outline-danger px-3 rounded-2" id="clearHistoryBtn">Clear History</button>
                </div>
            </div>

            <!-- Content Grid Container -->
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4 mb-5" id="resultsGrid"></div>

            <!-- Pagination Bar -->
            <footer class="d-none text-center py-4 mb-5" id="paginationContainer">
                <button class="btn btn-apple-action px-5 py-2.5 shadow-sm" id="loadMoreBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="loadMoreSpinner" role="status" aria-hidden="true"></span>
                    Load More Content
                </button>
            </footer>
        </main>
    </div>

    <!-- macOS visionOS Theater Overlay Stage -->
    <div class="modal fade modal-fullscreen-theater" id="playerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content border-0 rounded-0">
                <div class="modal-header d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-2">
                        <div class="mac-traffic-lights">
                            <span class="mac-dot mac-dot-close" data-bs-dismiss="modal" style="cursor:pointer;"></span>
                        </div>
                        <h2 class="modal-title h6 text-truncate fw-semibold text-dark m-0 ps-2" id="playerModalTitle">Playback Engine Arena Stage</h2>
                    </div>
                    <button type="button" class="btn-close small" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="videoPlayer" class="fullscreen-iframe" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
                </div>
                <div class="modal-footer d-flex flex-row justify-content-between align-items-center">
                    <button class="btn btn-theater-control px-4" id="prevStreamBtn" disabled>Previous</button>
                    <span class="fw-semibold text-uppercase text-muted tracking-wider" style="font-size: 0.72rem; letter-spacing: 0.05em;" id="streamIndicator">STAGE IDLE</span>
                    <button class="btn btn-theater-control px-4 d-flex align-items-center gap-1" id="nextStreamBtn" disabled>
                        <span class="spinner-border spinner-border-sm d-none" id="nextBtnSpinner" role="status"></span>
                        <span id="nextBtnText">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Overlay -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="errorToast" class="toast align-items-center text-dark bg-white border-0 shadow-lg rounded-3" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2 small"><span id="toastErrorMessage">An internal error occurred.</span></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        class MetsisStudio {
            constructor() {
                this.API_KEY = "AIzaSyBqnF7lJJ-AHO2wsYOe2jvjloKNR5Qw8u0"; 
                this.STORAGE_KEY = "porto_studio_history_v1";
                this.WATCH_HISTORY_KEY = "metsis_studio_watch_history_v1";
                this.MAX_RESULTS = 12;

                this.currentRoute = "dashboard"; 
                this.currentQuery = "";
                this.nextPageToken = "";
                this.itemsCache = [];
                this.activeIndex = -1;
                this.isFetchingNextBatch = false;
                
                this.searchHistory = JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || [];
                this.watchHistory = JSON.parse(localStorage.getItem(this.WATCH_HISTORY_KEY)) || [];

                this.initDOMReferences();
                this.initBootstrapContexts();
                this.initEventBindings();
                
                this.switchRoute("dashboard");
            }

            initDOMReferences() {
                const d = document;
                this.searchInput = d.getElementById("searchInput");
                this.clearBtn = d.getElementById("clearBtn");
                this.suggestionsPanel = d.getElementById("suggestionsPanel");
                this.resultsGrid = d.getElementById("resultsGrid");
                this.searchBtn = d.getElementById("searchBtn");
                this.searchSpinner = d.getElementById("searchSpinner");
                this.loadMoreBtn = d.getElementById("loadMoreBtn");
                this.loadMoreSpinner = d.getElementById("loadMoreSpinner");
                this.paginationContainer = d.getElementById("paginationContainer");
                this.modalElement = d.getElementById("playerModal");
                this.videoPlayer = d.getElementById("videoPlayer");
                this.modalTitle = d.getElementById("playerModalTitle");
                this.prevStreamBtn = d.getElementById("prevStreamBtn");
                this.nextStreamBtn = d.getElementById("nextStreamBtn");
                this.nextBtnSpinner = d.getElementById("nextBtnSpinner");
                this.nextBtnText = d.getElementById("nextBtnText");
                this.streamIndicator = d.getElementById("streamIndicator");
                this.searchWrapper = d.getElementById("searchSystemWrapper");
                this.toastElement = d.getElementById("errorToast");
                this.toastMessage = d.getElementById("toastErrorMessage");
                this.searchSectionWrapper = d.getElementById("searchSectionWrapper");
                this.viewHeaderSegment = d.getElementById("viewHeaderSegment");
                this.viewSectionTitle = d.getElementById("viewSectionTitle");
                this.historyActionDeck = d.getElementById("historyActionDeck");
                this.clearHistoryBtn = d.getElementById("clearHistoryBtn");
                this.zynixSidebar = d.getElementById("zynixSidebar");
                this.sidebarBackdrop = d.getElementById("sidebarBackdrop");
                this.toggleSidebarBtn = d.getElementById("toggleSidebarBtn");
                this.closeSidebarBtn = d.getElementById("closeSidebarBtn");
            }

            initBootstrapContexts() {
                this.errorToast = new bootstrap.Toast(this.toastElement);
                this.playerModal = new bootstrap.Modal(this.modalElement, { backdrop: 'static', keyboard: true });
            }

            initEventBindings() {
                this.searchInput.addEventListener("input", this.debounce(() => this.handleSearchInputChange(), 120));
                this.searchInput.addEventListener("focus", () => this.renderHistoryPanel());
                this.searchInput.addEventListener("keydown", (e) => { if (e.key === "Enter") this.triggerNewSearch(); });
                this.clearBtn.addEventListener("click", () => this.clearSearchField());
                this.searchBtn.addEventListener("click", () => this.triggerNewSearch());
                this.loadMoreBtn.addEventListener("click", () => this.executeContentFetch());
                this.prevStreamBtn.addEventListener("click", () => this.shiftActiveStream(-1));
                this.nextStreamBtn.addEventListener("click", () => this.shiftActiveStream(1));
                this.clearHistoryBtn.addEventListener("click", () => this.clearUserWatchHistory());

                document.querySelectorAll(".sidebar-menu-item").forEach(link => {
                    link.addEventListener("click", (e) => {
                        this.switchRoute(e.currentTarget.dataset.target);
                        this.zynixSidebar.classList.remove("show-sidebar");
                        this.sidebarBackdrop.classList.remove("show-sidebar");
                    });
                });

                const toggleSidebar = () => {
                    this.zynixSidebar.classList.toggle("show-sidebar");
                    this.sidebarBackdrop.classList.toggle("show-sidebar");
                };
                this.toggleSidebarBtn.addEventListener("click", toggleSidebar);
                this.closeSidebarBtn.addEventListener("click", toggleSidebar);
                this.sidebarBackdrop.addEventListener("click", toggleSidebar);

                document.addEventListener("click", (e) => {
                    if (!this.searchWrapper.contains(e.target)) this.suggestionsPanel.classList.remove("show");
                }, { passive: true });

                this.resultsGrid.addEventListener("click", (e) => this.handleGridActivation(e));
                this.suggestionsPanel.addEventListener("click", (e) => this.handleSuggestionSelection(e));
                this.modalElement.addEventListener("hidden.bs.modal", () => { this.videoPlayer.src = ""; });
            }

            debounce(func, delay) {
                let timer;
                return (...args) => {
                    clearTimeout(timer);
                    timer = setTimeout(() => func.apply(this, args), delay);
                };
            }

            showError(msg) {
                this.toastMessage.innerText = msg;
                this.errorToast.show();
            }

            handleSearchInputChange() {
                this.clearBtn.classList.toggle("d-none", this.searchInput.value.trim().length === 0);
                this.renderHistoryPanel();
            }

            clearSearchField() {
                this.searchInput.value = "";
                this.clearBtn.classList.add("d-none");
                this.suggestionsPanel.classList.remove("show");
                this.searchInput.focus();
            }

            renderHistoryPanel() {
                const val = this.searchInput.value.trim().toLowerCase();
                const matches = this.searchHistory.filter(item => item.toLowerCase().includes(val)).reverse().slice(0, 5);

                if (matches.length > 0) {
                    const fragments = [];
                    matches.forEach(item => {
                        fragments.push(`<button type="button" class="suggestion-item d-flex justify-content-between align-items-center" data-query="${item}"><span>${this.escapeHtml(item)}</span><span class="badge bg-light text-muted border" style="font-size:0.6rem;">History</span></button>`);
                    });
                    this.suggestionsPanel.innerHTML = fragments.join('');
                    this.suggestionsPanel.classList.add("show");
                } else {
                    this.suggestionsPanel.classList.remove("show");
                }
            }

            handleSuggestionSelection(e) {
                const item = e.target.closest(".suggestion-item");
                if (!item) return;
                this.searchInput.value = item.dataset.query;
                this.clearBtn.classList.remove("d-none");
                this.suggestionsPanel.classList.remove("show");
                this.triggerNewSearch();
            }

            switchRoute(route) {
                this.currentRoute = route;
                
                document.querySelectorAll(".sidebar-menu-item").forEach(lnk => {
                    lnk.classList.toggle("active", lnk.dataset.target === route);
                });

                this.searchSectionWrapper.classList.add("d-none");
                this.viewHeaderSegment.classList.add("d-none");
                this.historyActionDeck.classList.add("d-none");
                this.paginationContainer.classList.add("d-none");
                this.resultsGrid.innerHTML = "";

                switch(route) {
                    case "dashboard":
                        this.searchSectionWrapper.classList.remove("d-none");
                        if(this.itemsCache.length > 0) {
                            this.renderGridItems(this.itemsCache, true);
                            this.paginationContainer.classList.toggle("d-none", !this.nextPageToken);
                        } else {
                            this.resultsGrid.innerHTML = `<div class="col-12 w-100 text-center py-5 text-muted fw-medium">Use the Spotlight search field to pipeline media into your active workspace.</div>`;
                        }
                        break;
                    case "discover":
                        this.searchSectionWrapper.classList.remove("d-none");
                        this.renderGridItems(this.itemsCache, true);
                        this.paginationContainer.classList.toggle("d-none", !this.nextPageToken);
                        break;
                    case "playlists":
                        this.viewHeaderSegment.classList.remove("d-none");
                        this.viewSectionTitle.innerText = "Discovered Playlists Only";
                        const pl = this.itemsCache.filter(item => item.id.kind === "youtube#playlist");
                        this.renderGridItems(pl, true);
                        break;
                    case "history":
                        this.viewHeaderSegment.classList.remove("d-none");
                        this.viewSectionTitle.innerText = "Playback Engine Historical Logs";
                        this.historyActionDeck.classList.remove("d-none");
                        this.renderWatchHistoryView();
                        break;
                }
            }

            triggerNewSearch() {
                const query = this.searchInput.value.trim();
                if (!query) return;

                this.currentQuery = query;
                this.nextPageToken = "";
                this.itemsCache = [];
                this.activeIndex = -1;
                this.resultsGrid.innerHTML = "";
                this.paginationContainer.classList.add("d-none");

                this.searchHistory = this.searchHistory.filter(item => item.toLowerCase() !== query.toLowerCase());
                this.searchHistory.push(query);
                if (this.searchHistory.length > 8) this.searchHistory.shift();
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.searchHistory));

                if(this.currentRoute !== "dashboard" && this.currentRoute !== "discover") {
                    this.switchRoute("discover");
                }
                this.executeContentFetch();
            }

            async executeContentFetch() {
                if (!this.currentQuery || this.isFetchingNextBatch) return true;
                
                const isPagination = this.nextPageToken !== "";
                if (!isPagination) this.setLoadingState(true);
                else this.setNextButtonLoadingState(true);

                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${this.MAX_RESULTS}&q=${encodeURIComponent(this.currentQuery)}&type=video,playlist&key=${this.API_KEY}`;
                if (this.nextPageToken) url += `&pageToken=${this.nextPageToken}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    this.setLoadingState(false);
                    this.setNextButtonLoadingState(false);

                    if (data.error) {
                        this.showError(`YouTube API Pipeline Communication Fault.`);
                        return true;
                    }

                    this.nextPageToken = data.nextPageToken || "";
                    if (data.items && data.items.length > 0) {
                        this.itemsCache = this.itemsCache.concat(data.items);
                        this.renderGridItems(data.items, false);
                        this.syncControlInterface();
                        this.paginationContainer.classList.toggle("d-none", !this.nextPageToken);
                        return false; 
                    }
                    return true; 
                } catch (error) {
                    this.setLoadingState(false);
                    this.setNextButtonLoadingState(false);
                    this.showError("Network exception occurred.");
                    return true;
                }
            }

            setLoadingState(isLoading) {
                this.searchBtn.disabled = isLoading;
                this.loadMoreBtn.disabled = isLoading;
                this.searchSpinner.classList.toggle("d-none", !isLoading);
                this.loadMoreSpinner.classList.toggle("d-none", !isLoading);
                this.resultsGrid.classList.toggle("loading-shimmer", isLoading);
            }

            setNextButtonLoadingState(isLoading) {
                this.isFetchingNextBatch = isLoading;
                if (isLoading) {
                    this.nextBtnSpinner.classList.remove("d-none");
                    this.nextBtnText.innerText = "Loading...";
                    this.prevStreamBtn.disabled = true;
                } else {
                    this.nextBtnSpinner.classList.add("d-none");
                    this.nextBtnText.innerText = "Next";
                }
            }

            renderGridItems(items, clearContainer = false) {
                if (clearContainer) this.resultsGrid.innerHTML = "";
                if (items.length === 0) {
                    this.resultsGrid.innerHTML = `<div class="col-12 w-100 text-center py-5 text-muted fw-medium">No standard records matched parameters.</div>`;
                    return;
                }

                const fragments = [];
                items.forEach((item, idx) => {
                    const globalIndex = clearContainer ? idx : (this.itemsCache.indexOf(item) !== -1 ? this.itemsCache.indexOf(item) : idx);
                    const isPlaylist = item.id.kind === "youtube#playlist";
                    const targetId = isPlaylist ? item.id.playlistId : item.id.videoId;
                    const title = this.escapeHtml(item.snippet.title);
                    const thumbnail = this.escapeHtml(item.snippet.thumbnails?.medium?.url || "");
                    const channel = this.escapeHtml(item.snippet.channelTitle);

                    fragments.push(`
                        <div class="col video-card-wrapper">
                            <article class="card h-100 video-card border-0 position-relative" id="video-card-${globalIndex}" data-index="${globalIndex}" data-id="${targetId}" data-is-playlist="${isPlaylist}" data-context="cache" role="button">
                                <div class="ratio ratio-16x9 bg-light"><img src="${thumbnail}" class="card-img-top object-fit-cover" alt="" loading="lazy" width="320" height="180"></div>
                                <div class="card-body p-3 d-flex flex-column justify-content-between">
                                    <div>
                                        <div class="mb-2"><span class="badge-zynix ${isPlaylist ? 'badge-zynix-playlist' : 'badge-zynix-video'}">${isPlaylist ? 'Playlist' : 'Video'}</span></div>
                                        <h3 class="card-title h6 fw-semibold mb-2 text-dark" style="-webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; height: 2.4rem; overflow: hidden; line-height: 1.25; font-size: 0.88rem; letter-spacing: -0.01em;">${title}</h3>
                                    </div>
                                    <div class="pt-2 text-muted small text-truncate fw-medium mt-1" style="font-size:0.75rem;">${channel}</div>
                                </div>
                            </article>
                        </div>`);
                });
                this.resultsGrid.insertAdjacentHTML('beforeend', fragments.join(''));
            }

            renderWatchHistoryView() {
                this.resultsGrid.innerHTML = "";
                if (this.watchHistory.length === 0) {
                    this.resultsGrid.innerHTML = `<div class="col-12 w-100 text-center py-5 text-muted fw-medium">No items found in watch history logs.</div>`;
                    return;
                }

                const fragments = [];
                this.watchHistory.slice().reverse().forEach((item, idx) => {
                    const title = this.escapeHtml(item.title);
                    const thumbnail = this.escapeHtml(item.thumbnail);
                    const channel = this.escapeHtml(item.channel);
                    const isPlaylist = item.isPlaylist === true || item.isPlaylist === "true";

                    fragments.push(`
                        <div class="col video-card-wrapper">
                            <article class="card h-100 video-card border-0 position-relative" id="history-card-${idx}" data-index="${idx}" data-id="${item.id}" data-is-playlist="${isPlaylist}" data-context="history" role="button">
                                <div class="ratio ratio-16x9 bg-light"><img src="${thumbnail}" class="card-img-top object-fit-cover" alt="" loading="lazy" width="320" height="180"></div>
                                <div class="card-body p-3 d-flex flex-column justify-content-between">
                                    <div>
                                        <div class="mb-2"><span class="badge-zynix ${isPlaylist ? 'badge-zynix-playlist' : 'badge-zynix-video'}">${isPlaylist ? 'Playlist' : 'Video'}</span></div>
                                        <h3 class="card-title h6 fw-semibold mb-2 text-dark" style="-webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; height: 2.4rem; overflow: hidden; line-height: 1.25; font-size: 0.88rem; letter-spacing: -0.01em;">${title}</h3>
                                    </div>
                                    <div class="pt-2 text-muted small text-truncate fw-medium mt-1" style="font-size:0.75rem;">${channel}</div>
                                </div>
                            </article>
                        </div>`);
                });
                this.resultsGrid.innerHTML = fragments.join('');
            }

            handleGridActivation(e) {
                const card = e.target.closest(".video-card");
                if (!card) return;

                const id = card.dataset.id;
                const isPlaylist = card.dataset.isPlaylist === "true";
                const context = card.dataset.context;
                const index = parseInt(card.dataset.index, 10);

                if (context === "history") {
                    const item = this.watchHistory.slice().reverse()[index];
                    if (item) this.deployHistoryPlaybackInstance(item);
                } else {
                    this.deployStreamInstance(id, isPlaylist, index);
                }
            }

            deployStreamInstance(id, isPlaylist, index) {
                this.activeIndex = index;
                const asset = this.itemsCache[index];
                if (!asset) return;

                this.logToWatchHistory({
                    id: id,
                    isPlaylist: isPlaylist,
                    title: asset.snippet.title,
                    thumbnail: asset.snippet.thumbnails?.medium?.url || asset.snippet.thumbnails?.default?.url || "",
                    channel: asset.snippet.channelTitle
                });

                this.videoPlayer.src = isPlaylist 
                    ? `https://www.youtube-nocookie.com/embed/videoseries?list=${this.escapeHtml(id)}&autoplay=1`
                    : `https://www.youtube-nocookie.com/embed/${this.escapeHtml(id)}?autoplay=1&rel=0`;
                
                this.modalTitle.innerHTML = this.escapeHtml(asset.snippet.title);

                document.querySelectorAll(".video-card.border-active-track").forEach(c => c.classList.remove("border-active-track"));
                const activeCard = document.getElementById(`video-card-${index}`);
                if (activeCard) activeCard.classList.add("border-active-track");

                this.syncControlInterface();
                if (!this.modalElement.classList.contains("show")) this.playerModal.show();
            }

            deployHistoryPlaybackInstance(historyItem) {
                this.videoPlayer.src = historyItem.isPlaylist
                    ? `https://www.youtube-nocookie.com/embed/videoseries?list=${this.escapeHtml(historyItem.id)}&autoplay=1`
                    : `https://www.youtube-nocookie.com/embed/${this.escapeHtml(historyItem.id)}?autoplay=1&rel=0`;
                
                this.modalTitle.innerHTML = this.escapeHtml(historyItem.title);
                this.prevStreamBtn.disabled = true;
                this.nextStreamBtn.disabled = true;
                this.streamIndicator.innerText = "LOG RECORD PLAYBACK";
                this.playerModal.show();
            }

            logToWatchHistory(itemData) {
                this.watchHistory = this.watchHistory.filter(item => item.id !== itemData.id);
                this.watchHistory.push(itemData);
                if (this.watchHistory.length > 40) this.watchHistory.shift();
                localStorage.setItem(this.WATCH_HISTORY_KEY, JSON.stringify(this.watchHistory));
            }

            clearUserWatchHistory() {
                if(confirm("Confirm deletion of watch log registry?")) {
                    this.watchHistory = [];
                    localStorage.removeItem(this.WATCH_HISTORY_KEY);
                    if(this.currentRoute === "history") this.renderWatchHistoryView();
                }
            }

            async shiftActiveStream(offset) {
                const targetIndex = this.activeIndex + offset;
                if (offset === 1 && targetIndex >= this.itemsCache.length) {
                    if (!this.nextPageToken) return; 
                    const hasError = await this.executeContentFetch();
                    if (!hasError && this.itemsCache[targetIndex]) {
                        const nextAsset = this.itemsCache[targetIndex];
                        this.deployStreamInstance(nextAsset.id.playlistId || nextAsset.id.videoId, nextAsset.id.kind === "youtube#playlist", targetIndex);
                    }
                    return;
                }

                if (targetIndex < 0 || targetIndex >= this.itemsCache.length) return;
                const asset = this.itemsCache[targetIndex];
                this.deployStreamInstance(asset.id.playlistId || asset.id.videoId, asset.id.kind === "youtube#playlist", targetIndex);
            }

            syncControlInterface() {
                if (this.activeIndex === -1 || this.itemsCache.length === 0) {
                    this.prevStreamBtn.disabled = true;
                    this.nextStreamBtn.disabled = true;
                    this.streamIndicator.innerText = "STAGE IDLE";
                    return;
                }
                this.prevStreamBtn.disabled = (this.activeIndex === 0);
                this.nextStreamBtn.disabled = (this.activeIndex === this.itemsCache.length - 1 && !this.nextPageToken);
                this.streamIndicator.innerText = `${this.activeIndex + 1} / ${this.itemsCache.length}`;
            }

            escapeHtml(str) {
                if (!str) return "";
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }
        }

        document.addEventListener("DOMContentLoaded", () => { window.AppInstance = new MetsisStudio(); }, { once: true });
    </script>
</body>
</html>
