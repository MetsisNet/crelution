<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Private Chat</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- PeerJS for direct device-to-device connection -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .chat-box { height: 50vh; overflow-y: auto; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
    .message { max-width: 80%; padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; word-wrap: break-word; }
    .msg-sent { background-color: #0d6efd; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
    .msg-received { background-color: #e9ecef; color: black; margin-right: auto; border-bottom-left-radius: 2px; }
  </style>
</head>
<body>

<div class="container py-4" style="max-width: 600px;">
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body bg-light rounded">
      <h5 class="text-primary mb-3">Step 1: Your Secure ID</h5>
      <p class="small text-muted mb-2">Share this ID with your friend so they can connect to you.</p>
      <div class="input-group mb-3">
        <input type="text" id="my-id" class="form-control text-center fw-bold" readonly placeholder="Generating ID...">
        <button class="btn btn-outline-primary" onclick="copyId()">Copy</button>
      </div>
      
      <hr>

      <h5 class="text-primary mb-3">Step 2: Connect to Friend</h5>
      <p class="small text-muted mb-2">Or, paste your friend's ID here to connect to them.</p>
      <div class="input-group">
        <input type="text" id="friend-id" class="form-control" placeholder="Paste friend's ID here">
        <button class="btn btn-success" id="connect-btn" onclick="connectToFriend()">Connect</button>
      </div>
      <div id="status" class="text-center mt-3 fw-bold text-secondary">Status: Waiting to connect...</div>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <div class="chat-box d-flex flex-column mb-3" id="chatBox">
        <div class="text-center text-muted small mt-2">Chat is empty. Connect to start!</div>
      </div>
      <form id="chatForm" class="input-group">
        <input type="text" id="messageInput" class="form-control rounded-pill me-2" placeholder="Type a message..." disabled required autocomplete="off">
        <button class="btn btn-primary rounded-circle px-3" type="submit" id="send-btn" disabled>Send</button>
      </form>
    </div>
  </div>
</div>

<script>
  // Initialize PeerJS (Connects to a free public signaling server automatically)
  const peer = new Peer();
  let conn;

  // When PeerJS gives us an ID, show it on the screen
  peer.on('open', (id) => {
    document.getElementById('my-id').value = id;
  });

  // When a friend connects to US
  peer.on('connection', (connection) => {
    conn = connection;
    setupConnection();
  });

  // When WE connect to a friend
  function connectToFriend() {
    const friendId = document.getElementById('friend-id').value.trim();
    if (!friendId) return alert("Please enter an ID");
    
    document.getElementById('status').innerText = "Connecting...";
    document.getElementById('status').className = "text-center mt-3 fw-bold text-warning";
    
    conn = peer.connect(friendId);
    setupConnection();
  }

  // Handle the active connection for both sending and receiving
  function setupConnection() {
    conn.on('open', () => {
      document.getElementById('status').innerText = "Connected! You can now chat.";
      document.getElementById('status').className = "text-center mt-3 fw-bold text-success";
      
      // Enable chat inputs
      document.getElementById('messageInput').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chatBox').innerHTML = ""; // Clear empty message
    });

    // When we receive a message
    conn.on('data', (data) => {
      displayMessage(data, 'received');
    });

    conn.on('close', () => {
      document.getElementById('status').innerText = "Connection lost.";
      document.getElementById('status').className = "text-center mt-3 fw-bold text-danger";
    });
  }

  // Handle sending a message
  document.getElementById('chatForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const msgInput = document.getElementById('messageInput');
    const msg = msgInput.value.trim();
    
    if (msg && conn && conn.open) {
      conn.send(msg);               // Send to friend
      displayMessage(msg, 'sent');  // Show on our screen
      msgInput.value = '';          // Clear input
    }
  });

  // Function to show messages in the UI
  function displayMessage(text, type) {
    const chatBox = document.getElementById('chatBox');
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', type === 'sent' ? 'msg-sent' : 'msg-received');
    msgDiv.innerText = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll
  }

  // Copy ID helper
  function copyId() {
    const idField = document.getElementById('my-id');
    idField.select();
    document.execCommand('copy');
    alert("ID copied! Send this to your friend.");
  }
</script>

</body>
</html>
