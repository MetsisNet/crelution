<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instant URL Chat</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- MQTTJS via CDN for firewall-proof global connection -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; }
    .chat-container { max-width: 600px; margin: 1rem auto; padding: 10px; }
    .chat-box { height: 55vh; overflow-y: auto; background-color: #ffffff; padding: 15px; border-radius: 12px; }
    .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; word-wrap: break-word; }
    .msg-sent { background-color: #0d6efd; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg-received { background-color: #e9ecef; color: black; margin-right: auto; border-bottom-left-radius: 4px; }
    .sender-title { font-size: 0.75rem; opacity: 0.8; margin-bottom: 2px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container chat-container">
  <!-- Link Sharing Card -->
  <div class="card shadow-sm border-0 rounded-3 mb-3" id="shareCard">
    <div class="card-body bg-white">
      <h6 class="text-primary fw-bold mb-1">🌐 Invite Your Friend</h6>
      <p class="small text-muted mb-2">Send this exact link to your friend. Once they open it on their phone, your chat room will link up.</p>
      <div class="input-group">
        <input type="text" id="shareUrl" class="form-control form-control-sm bg-light text-secondary" readonly>
        <button class="btn btn-sm btn-primary" onclick="copyLink()">Copy Link</button>
      </div>
    </div>
  </div>

  <!-- Chat Window -->
  <div class="card shadow border-0 rounded-4 overflow-hidden">
    <div class="card-header bg-primary text-white p-3 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold">Global Chat Line</h5>
      <span class="badge bg-light text-primary py-2 px-3 rounded-pill" id="myUsername">...</span>
    </div>
    
    <div class="card-body chat-box d-flex flex-column" id="chatBox">
      <div class="text-center text-muted small my-auto" id="loadingStatus">Connecting to secure web network...</div>
    </div>
    
    <div class="card-footer bg-white p-3 border-top-0">
      <form id="chatForm" class="input-group">
        <input type="text" id="messageInput" class="form-control rounded-pill me-2" placeholder="Type a message..." disabled required autocomplete="off">
        <button class="btn btn-primary rounded-circle px-3" type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </div>
  </div>
</div>

<script>
  // 1. Handle the Room URL Assignment Automatically
  const urlParams = new URLSearchParams(window.location.search);
  let room = urlParams.get('room');
  
  if (!room) {
    // Generates a unique secure string for your chat room if none exists in the URL bar
    room = 'room_' + Math.random().toString(36).substring(2, 11);
    urlParams.set('room', room);
    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?' + urlParams.toString();
    window.history.pushState({path: newUrl}, '', newUrl);
  }

  // Set the live sharing URL input field value
  document.getElementById('shareUrl').value = window.location.href;

  // 2. Identify the Chattering Parties
  let username = localStorage.getItem('chat_nickname');
  if (!username) {
    username = prompt("Enter your name:") || "User_" + Math.floor(Math.random() * 1000);
    localStorage.setItem('chat_nickname', username);
  }
  document.getElementById('myUsername').innerText = username;

  // 3. Connect via Global Public WebSockets Broker (Bypasses Carrier NAT Walls)
  const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt'; 
  const topic = 'uniquesecureline/' + room;
  
  const client = mqtt.connect(brokerUrl, {
    clientId: 'user_' + Math.random().toString(36).substring(2, 11),
    clean: true,
    connectTimeout: 5000
  });

  const chatBox = document.getElementById('chatBox');
  const loadingStatus = document.getElementById('loadingStatus');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  client.on('connect', () => {
    if(loadingStatus) loadingStatus.remove();
    
    // Subscribe to your unique link-generated channel
    client.subscribe(topic, (err) => {
      if (!err) {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        
        const banner = document.createElement('div');
        banner.className = 'text-center text-success small my-2 fw-bold';
        banner.innerText = "✓ Active connection established.";
        chatBox.appendChild(banner);
      }
    });
  });

  // 4. Inbound Message Streams
  client.on('message', (incomingTopic, payload) => {
    try {
      const data = JSON.parse(payload.toString());
      const isMe = data.sender === username;
      
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', isMe ? 'msg-sent' : 'msg-received', 'd-flex', 'flex-column');
      
      msgDiv.innerHTML = `
        <span class="sender-title">${data.sender}</span>
        <span>${data.text}</span>
      `;
      
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    } catch (e) {
      console.error(e);
    }
  });

  // 5. Outbound Message Transmissions
  document.getElementById('chatForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const text = messageInput.value.trim();
    if (text) {
      const payload = { sender: username, text: text };
      client.publish(topic, JSON.stringify(payload));
      messageInput.value = '';
    }
  });

  // Helper copy execution
  function copyLink() {
    const copyText = document.getElementById("shareUrl");
    copyText.select();
    copyText.setSelectionRange(0, 99999); // Mobile compatibility constraint
    navigator.clipboard.writeText(copyText.value);
    alert("Link copied! Send it to your friend now.");
  }
</script>
</body>
</html>
