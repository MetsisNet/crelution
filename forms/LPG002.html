<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Real-Time Chat</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; }
    .chat-container { max-width: 800px; margin: 2rem auto; }
    .chat-box { 
      height: 60vh; 
      overflow-y: auto; 
      background-color: #ffffff; 
      padding: 20px;
    }
    /* Scrollbar styling */
    .chat-box::-webkit-scrollbar { width: 6px; }
    .chat-box::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 3px; }
    
    /* Message Bubbles */
    .message {
      max-width: 75%;
      padding: 10px 15px;
      border-radius: 18px;
      margin-bottom: 15px;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease-in-out;
    }
    .msg-sent {
      background-color: #0d6efd;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .msg-received {
      background-color: #e9ecef;
      color: #212529;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    .sender-name {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .msg-sent .sender-name { color: #d0e3ff; text-align: right; }
    .msg-received .sender-name { color: #6c757d; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container chat-container">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
      <!-- Chat Header -->
      <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-chat-dots me-2" viewBox="0 0 16 16">
            <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
            <path d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9.06 9.06 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.437 10.437 0 0 1-.524 2.318l-.003.011a10.722 10.722 0 0 1-.244.637c-.079.186.074.394.273.362a21.673 21.673 0 0 0 .693-.125zm.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8.06 8.06 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a10.97 10.97 0 0 0 .398-2z"/>
          </svg>
          Global Room
        </h5>
        <span class="badge bg-light text-primary" id="userNameDisplay">Guest</span>
      </div>
      
      <!-- Chat Messages Area -->
      <div class="card-body chat-box d-flex flex-column" id="chatBox">
        <div class="text-center text-muted small my-3">Welcome to the chat! Messages will appear here.</div>
      </div>
      
      <!-- Input Area -->
      <div class="card-footer bg-white p-3 border-top-0">
        <form id="chatForm" class="input-group">
          <input type="text" id="messageInput" class="form-control rounded-pill me-2" placeholder="Type your message..." required autocomplete="off">
          <button class="btn btn-primary rounded-circle px-3" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send" viewBox="0 0 16 16">
              <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Firebase Modular SDK -->
  <script type="module">
    // Import Firebase functions from CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ==========================================
    // STEP 3: PASTE YOUR FIREBASE CONFIG HERE
    // ==========================================
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "messages");

    // Ask for Username
    let username = localStorage.getItem("chatUsername");
    if (!username) {
        username = prompt("Enter your name to join the chat:") || "Anonymous";
        localStorage.setItem("chatUsername", username);
    }
    document.getElementById('userNameDisplay').innerText = username;

    const chatBox = document.getElementById('chatBox');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');

    // Function to display messages in the UI
    function appendMessage(msgData) {
        const isMe = msgData.sender === username;
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', isMe ? 'msg-sent' : 'msg-received', 'd-flex', 'flex-column');
        
        msgDiv.innerHTML = `
            <span class="sender-name">${msgData.sender}</span>
            <span>${msgData.text}</span>
        `;
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }

    // Listen for incoming messages in real-time
    onChildAdded(messagesRef, (snapshot) => {
        const data = snapshot.val();
        appendMessage(data);
    });

    // Handle sending a message
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text) {
            // Push message to Firebase Database
            push(messagesRef, {
                sender: username,
                text: text,
                timestamp: Date.now()
            });
            messageInput.value = ''; // Clear input
        }
    });
  </script>
</body>
</html>
