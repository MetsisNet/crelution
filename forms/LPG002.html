<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global API Chat</title>
    <!-- Bootstrap 5 for immediate clean styling on mobile devices -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
        #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; width: 100%; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg-me { background-color: #0d6efd; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-them { background-color: #f1f3f5; color: #212529; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.72rem; opacity: 0.7; margin-bottom: 2px; display: block; font-weight: 600; }
    </style>
</head>
<body>

<div id="chat-container">
    <!-- Header -->
    <div class="p-3 bg-primary text-white d-flex justify-content-between align-items-center">
        <div>
            <h6 class="mb-0 fw-bold">Secure API Chat</h6>
            <small id="room-display" class="opacity-75">Loading room...</small>
        </div>
        <button class="btn btn-sm btn-outline-light" onclick="copyShareUrl()">Copy Link</button>
    </div>

    <!-- Messages Window -->
    <div id="messages"></div>

    <!-- Input Bar -->
    <div class="p-3 bg-light border-top">
        <form id="chat-form" onsubmit="sendMessage(event)" class="d-flex gap-2">
            <input type="text" id="msg-input" class="form-control" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit" class="btn btn-primary px-4">Send</button>
        </form>
    </div>
</div>

<!-- Official PubNub SDK CDN -->
<script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>

<script>
    // ==========================================
    // 1. CONFIGURATION
    // Get your free keys at https://dashboard.pubnub.com
    // ==========================================
    const MY_PUBLISH_KEY = "demo"; 
    const MY_SUBSCRIBE_KEY = "demo";

    // ==========================================
    // 2. DYNAMIC ROOM & IDENTITY SETUP
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room');
    
    // Automatically generate a clean 7-character room code if none exists
    if (!roomId) {
        roomId = Math.random().toString(36).substring(2, 9);
        urlParams.set('room', roomId);
        window.history.replaceState({}, '', `${window.location.pathname}?${urlParams}`);
    }
    document.getElementById('room-display').innerText = `Room ID: ${roomId}`;

    // Establish a unique local identity per user device
    let myId = localStorage.getItem('chat_api_user_id');
    if (!myId) {
        myId = 'user_' + Math.random().toString(36).substring(2, 7);
        localStorage.setItem('chat_api_user_id', myId);
    }

    // ==========================================
    // 3. API INITIALIZATION & EVENT LISTENERS
    // ==========================================
    const pubnub = new PubNub({
        publishKey: MY_PUBLISH_KEY,
        subscribeKey: MY_SUBSCRIBE_KEY,
        userId: myId
    });

    // Handle real-time incoming data payloads
    pubnub.addListener({
        message: function(event) {
            renderMessage(event.message);
        },
        status: function(statusEvent) {
            if (statusEvent.category === "PNConnectedCategory") {
                console.log("Successfully bridged into global message mesh network.");
            }
        }
    });

    // Subscribe to the unique room stream channel
    pubnub.subscribe({
        channels: [roomId]
    });

    // ==========================================
    // 4. CHAT ACTIONS
    // ==========================================
    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        const payload = {
            sender: myId,
            text: text
        };

        // Stream the message to the API channel
        pubnub.publish({
            channel: roomId,
            message: payload
        }, function(status, response) {
            if (!status.error) {
                input.value = ''; // Clean input bar on successful delivery
            } else {
                console.error("API error during network transfer:", status);
            }
        });
    }

    function renderMessage(msg) {
        const container = document.getElementById('messages');
        const isMe = msg.sender === myId;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
        
        const metaSpan = document.createElement('span');
        metaSpan.className = 'msg-meta';
        metaSpan.innerText = isMe ? 'You' : 'Friend';
        
        const textNode = document.createTextNode(msg.text);
        
        msgDiv.appendChild(metaSpan);
        msgDiv.appendChild(textNode);
        container.appendChild(msgDiv);
        
        // Dynamic push scrolling to follow text stream
        container.scrollTop = container.scrollHeight;
    }

    function copyShareUrl() {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied! Send it to your friend to join the room.");
    }
</script>
</body>
</html>
